<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Guardarropa</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Guardarropa">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{overscroll-behavior:none;-webkit-overflow-scrolling:auto}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#f5f0eb;color:#1a1a1a;min-height:100vh;padding-bottom:80px;overscroll-behavior:none;-webkit-overflow-scrolling:auto}

/* SPLASH */
@keyframes mg-zoom{from{transform:scale(0.3);opacity:0}15%{opacity:1}to{transform:scale(2.5);opacity:0}}
#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.5s ease}
#splash.out{opacity:0;pointer-events:none}
.splash-mg{font-size:48px;font-weight:100;letter-spacing:8px;color:#fff;animation:mg-zoom 2.2s ease-in forwards}
.splash-line{width:60px;height:0.5px;background:#fff;margin:14px auto;opacity:0;animation:fadeIn 0.3s 0.1s forwards}
.splash-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#888;font-weight:300;opacity:0;animation:fadeIn 0.3s 0.2s forwards}
@keyframes fadeIn{to{opacity:1}}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#000;display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;padding:13px 0 10px;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:transparent;cursor:pointer;font-size:11.5px;color:rgba(255,26,0,.55);letter-spacing:1px;text-transform:uppercase;font-weight:400}
.bnav-btn.active{color:#ff1a00}
.bnav-icon{font-size:22px;line-height:1}

/* SCREENS */
.screen{display:none;max-width:600px;margin:0 auto}
.screen.active{display:block}

/* INICIO — hero editorial: fotos encadenadas con zoom lento + texto fijo encima (ref. Zara) */
.slideshow{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;background:#000}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 0.6s ease;pointer-events:none;overflow:hidden}
.slide.active{opacity:1;pointer-events:auto}
.slide img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.slide.active img{animation:kenburns 7s ease-out forwards}
@keyframes kenburns{from{transform:scale(1)}to{transform:scale(1.07)}}
.slide-collage{display:flex;gap:4px;background:#f5f0eb}
.slide-collage img{width:33.333%;min-width:0;object-position:center 20%}
.slide-collage img:nth-child(2){height:86%;align-self:center}
.slide-collage.active img{animation:none}
.hero-txt{position:absolute;left:20px;top:50%;transform:translateY(-50%);z-index:5;color:#ff1a00;font-size:36px;font-weight:200;letter-spacing:3px;text-transform:uppercase;line-height:1.15;pointer-events:none}
.editorial-strip{display:flex;flex-direction:column;gap:0}
.editorial-strip img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:center top;display:block}

/* PANTALLAS NEGRAS (Closet, Outfit) */
.dark-screen{background:#000;min-height:calc(100vh - 62px)}
#lista-armonias{min-height:0;height:auto}
#closet-main{display:flex;flex-direction:column;align-items:stretch;justify-content:center;padding:20px 0 20px;height:calc(100vh - 62px);box-sizing:border-box;overflow-y:auto}
#outfit-main{display:flex;flex-direction:column;justify-content:center;padding:20px 0 80px;height:calc(100vh - 62px);box-sizing:border-box;overflow-y:auto}

/* BACK BUTTON — grande y visible */
.back-bar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:#000;border-bottom:1px solid #111;cursor:pointer;position:sticky;top:0;z-index:80}
.back-arrow{font-size:44px;color:#fff;font-weight:100;line-height:1;flex-shrink:0;padding:0 6px 0 0}
.back-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#fff;font-weight:300}

/* CATEGORY LINKS — centrados, sin divisor */
.cat-link{display:block;text-align:center;padding:11px 20px;cursor:pointer}
.cat-link-text{font-size:13px;font-weight:300;letter-spacing:1px;color:#fff;text-transform:uppercase}
.cat-link:active .cat-link-text{color:#555}
.cat-link-dim .cat-link-text{color:#555}

/* Items grid */
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:#e0dbd5;padding:2px}
.c-card{cursor:pointer}
/* CARD FLIP */
.flip-card{perspective:800px}
.flip-inner{position:relative;width:100%;aspect-ratio:3/5;transform-style:preserve-3d;transition:transform .45s ease}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.flip-front{background:#f0ebe5}
.flip-back{transform:rotateY(180deg);background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:6px;text-align:center}
.c-card-img{width:100%;height:100%;object-fit:contain;display:block}
.c-card-ph{width:100%;height:100%;background:#f0ebe5;display:flex;align-items:center;justify-content:center;font-size:30px}
.cb-nombre{font-size:12px;font-weight:300;letter-spacing:1px;text-transform:uppercase;color:#fff;line-height:1.4}
.cb-marca{font-size:9px;color:#666;letter-spacing:2px;text-transform:uppercase}
.c-card-color-row{display:flex;align-items:center;justify-content:center;gap:5px}
.c-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.15);flex-shrink:0}
.c-hex{font-size:9px;color:#555;font-family:monospace}
.cb-tipo{font-size:9px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.cb-formalidad{font-size:9px;color:#555;letter-spacing:1.5px;text-transform:uppercase}
.cb-select{margin-top:12px;padding:8px 18px;background:#fff;color:#000;border:none;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

/* COLOR SEARCH */
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:8px;padding:12px}
.color-bubble-wrap{position:relative;aspect-ratio:1}
.color-bubble,.color-bubble-all{width:100%;height:100%;border-radius:50%;cursor:pointer;border:2px solid transparent;display:block}
.color-bubble.on{border-color:#fff;box-shadow:0 0 0 1px #fff}
.color-bubble-all{background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)}
.color-bubble-all.on{border-color:#fff}
.color-cnt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,1),0 0 6px rgba(0,0,0,0.9);pointer-events:none;border-radius:50%;letter-spacing:-0.5px}

/* OUTFIT paso 2 — armonías como links */
.arm-link{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 20px;cursor:pointer;text-align:center}
.arm-link:active{opacity:.6}
.arm-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block}
.arm-link-nombre{font-size:13px;font-weight:300;letter-spacing:1px;text-transform:uppercase;color:#fff}
.arm-link-count{font-size:12px;color:#888;font-weight:300}

/* Ancla chip en paso2 header */
.res-hdr{padding:12px 20px;background:#000;border-bottom:1px solid #111;display:flex;align-items:center;gap:12px;position:relative;top:0;z-index:90}
#paso2-main{background:#000;min-height:calc(100vh - 62px)}
.res-back{font-size:30px;color:#fff;font-weight:100;cursor:pointer;flex-shrink:0;line-height:1}
.res-ancla-thumb{width:46px;height:62px;object-fit:contain;background:#111;flex-shrink:0;display:block}
.res-ancla-color{width:46px;height:62px;flex-shrink:0}
.res-ancla-info{flex:1}
.res-ancla-nombre{font-size:11px;letter-spacing:0.5px;color:#fff;font-weight:300}
.res-count{font-size:16px;color:#ff1a00;padding:10px 20px 4px;background:#000;letter-spacing:1px}

/* Outfits lista — scroll horizontal */
#paso2-outfits{position:fixed;top:0;bottom:62px;left:0;right:0;background:#000;z-index:60;flex-direction:column}
.outfits-wrap{flex:1;min-height:0;display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none;touch-action:pan-x}
.outfits-wrap::-webkit-scrollbar{display:none;width:0;height:0}
.outfits-wrap .nivel-div{display:none}
.outfit-card{background:#000;flex-shrink:0;width:100%;height:100%;position:relative;display:flex;flex-direction:column;scroll-snap-align:start}
.wada-badge{position:absolute;top:9px;right:12px;font-size:19px;font-weight:800;font-family:Georgia,'Times New Roman',serif;z-index:10;line-height:1;background:linear-gradient(180deg,#ffe27a 0%,#f5c518 45%,#b8860b 100%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 1px 1px rgba(0,0,0,0.55))}
.fav-btn{position:absolute;top:2px;right:36px;z-index:10;background:none;border:none;font-size:22px;color:#fff;cursor:pointer;text-shadow:0 0 6px rgba(0,0,0,0.6);padding:8px;line-height:1}
.fav-btn.on{color:#ff1a00}

/* DESBLOQUEO DE LOOKS — franjas de color a lo ancho */
.desb-franja{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:76px;margin-bottom:2px}
.desb-nombre{font-size:13px;letter-spacing:2.5px;text-transform:uppercase;font-weight:300}
.desb-hex{font-size:10px;font-family:monospace;opacity:.75;margin-top:3px}
.desb-num{font-size:28px;font-weight:200;letter-spacing:1px}
.desb-nota{font-size:9px;color:#888;letter-spacing:1.5px;text-transform:uppercase;padding:16px 20px;line-height:1.7;background:#000}
.outfit-body{display:flex;flex:1;min-height:0;gap:0;background:#000;padding:2px}
.of-left{flex:3;display:flex;flex-direction:column;gap:0}
.of-right{flex:2;display:flex;flex-direction:column;gap:0}
.of-left-item,.of-right-item{flex:1;min-height:0;overflow:hidden;background:#f7f5f2;position:relative}
.of-left-item img,.of-right-item img{width:100%;height:100%;object-fit:contain;display:block}
.of-color{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;background:#f7f5f2}
.outfit-paleta{display:flex;height:36px;flex-shrink:0}
.paleta-seg{flex:1}
.nivel-div{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:2px;font-weight:300;padding:10px 16px 4px;background:#000}
.wada-dot{width:7px;height:7px;background:#c9a227;border-radius:50%;flex-shrink:0}
.ver-todos-btn .arm-link-nombre{color:#fff;letter-spacing:.15em}
.no-outfits{text-align:center;padding:40px 20px;color:#555;background:#000;min-height:200px}
.no-outfits p{font-size:14px;margin-top:8px;color:#555}

/* CARGAR — en negro, misma lógica visual que Closet y Outfit */
#screen-cargar{background:#000;min-height:calc(100vh - 62px);padding-bottom:20px}
#screen-cargar .cargar-block{background:#000;border-bottom:1px solid #151515}
#screen-cargar .cargar-block-title{color:#fff}
#screen-cargar .ajustes-toggle{background:#000;color:#fff}
#screen-cargar .ajustes-chevron{color:#888}
#screen-cargar .ajustes-sec{border-top:1px solid #1a1a1a}
#screen-cargar .ajustes-sec-title{color:#888}
#screen-cargar .search-inp{background:#111;border-color:#333;color:#fff}
#screen-cargar .s-item{border-bottom:1px solid #1a1a1a}
#screen-cargar .s-item-nombre{color:#fff}
#screen-cargar .s-item-meta{color:#888}
#screen-cargar .s-item-img{background:#111}
#screen-cargar .btn-edit-s{background:#000;border:1px solid #333;color:#fff}
#screen-cargar .btn-del-s{background:#fff;color:#000}
.cargar-block{background:#fff;margin-bottom:2px}
.ajustes-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;padding:18px 16px;background:#fff;border:none;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:400;font-family:inherit;color:#1a1a1a}
.ajustes-chevron{font-size:17px;font-weight:300;color:#888;transition:transform .2s;display:inline-block;line-height:1}
.ajustes-chevron.open{transform:rotate(90deg)}
.ajustes-sec{padding:0 16px 18px;border-top:1px solid #f0ebe5}
.ajustes-sec-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#888;margin:14px 0 10px}
.cargar-block-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:400;padding:18px 16px 12px}
.search-wrap{display:flex;align-items:center;padding:0 16px 12px;gap:8px}
.search-inp{flex:1;padding:10px 12px;border:1px solid #e0dbd5;font-size:14px;background:#f8f5f2;outline:none}
.search-results{padding:0 16px 16px}
.s-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0ebe5}
.s-item-img{width:34px;height:46px;object-fit:contain;background:#f0ebe5;flex-shrink:0}
.s-item-info{flex:1}
.s-item-nombre{font-size:13px;font-weight:400}
.s-item-meta{font-size:10px;color:#888;letter-spacing:.5px;margin-top:1px}
.s-item-btns{display:flex;gap:4px;flex-shrink:0}
.btn-edit-s{padding:6px 10px;border:1px solid #e0dbd5;background:#fff;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.btn-del-s{padding:6px 10px;background:#000;color:#fff;border:none;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 22px;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:300;z-index:400;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.modal-overlay.open{display:flex}
.modal{background:#fff;padding:20px 16px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;overflow-x:hidden}
.modal-handle{width:36px;height:3px;background:#e0dbd5;margin:0 auto 16px}
.modal h3{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:400;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:9px;color:#888;margin-bottom:5px;font-weight:400;text-transform:uppercase;letter-spacing:1px}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid #e0dbd5;font-size:15px;background:#fff;-webkit-appearance:none;outline:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.foto-area{border:1px solid #e0dbd5;padding:20px;text-align:center;cursor:pointer;margin-bottom:14px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8f5f2}
.foto-area img{width:100%;max-height:200px;object-fit:contain}
.foto-area p{font-size:10px;color:#888;margin-top:6px;letter-spacing:1px;text-transform:uppercase}
#color-sugs{display:none;gap:8px;margin-top:8px;flex-wrap:wrap}
.color-sug-chip{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:border-color .15s}
.color-sug-chip.selected{border-color:#000;box-shadow:0 0 0 2px #fff,0 0 0 4px #000}
.mat-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.mat-row .mat-sel{flex:1;min-width:0;width:auto;padding:10px 12px;border:1px solid #e0dbd5;font-size:15px;background:#fff;-webkit-appearance:none;outline:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.mat-row .mat-pct{width:46px;flex-shrink:0;padding:10px 6px;border:1px solid #e0dbd5;font-size:14px;text-align:center;outline:none;-webkit-appearance:none;font-family:inherit}
.mat-del{width:34px;height:40px;border:none;background:#f0ebe5;font-size:17px;cursor:pointer;color:#888;flex-shrink:0}
.cuidado-grupo{margin-bottom:10px}
.cuidado-lbl{font-size:9px;color:#888;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px}
.cuidado-opts{display:flex;flex-wrap:wrap;gap:5px}
.c-chip{padding:5px 10px;border:1px solid #e0dbd5;background:#fff;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:inherit;color:#888;-webkit-appearance:none}
.c-chip.on{background:#000;color:#fff;border-color:#000}
.cb-cuidado{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:3px}
.cb-care-chip{font-size:8px;color:#555;letter-spacing:1px;text-transform:uppercase;border:1px solid #2a2a2a;padding:2px 6px}
.modal-btns{display:flex;gap:2px;margin-top:8px;padding-bottom:env(safe-area-inset-bottom)}
.btn-cancel{flex:1;padding:14px;border:1px solid #e0dbd5;background:#fff;font-size:11px;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.btn-save{flex:2;padding:14px;border:none;background:#000;color:#fff;font-size:11px;cursor:pointer;font-weight:400;letter-spacing:1px;text-transform:uppercase}
.color-row{display:flex;align-items:center;gap:6px;min-width:0}
.color-swatch-inp{width:44px;height:44px;border:1px solid #e0dbd5;cursor:pointer;flex-shrink:0}
.gotero-btn{width:38px;height:44px;border:1px solid #e0dbd5;background:#fff;cursor:pointer;color:#555;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;-webkit-appearance:none;padding:0}
.clear-x{width:38px;height:44px;border:none;background:#f0ebe5;font-size:17px;cursor:pointer;color:#888;flex-shrink:0;-webkit-appearance:none}
.gotero-btn.on{background:#000;color:#fff;border-color:#000}
.foto-area.gotero-modo{outline:2px solid #ff1a00;outline-offset:-2px;cursor:crosshair}
.hex-input{flex:1;min-width:0;width:100%;padding:10px 8px;border:1px solid #e0dbd5;font-size:14px;font-family:monospace;outline:none}
.c-ana{background:#1a7a1a}.c-comp{background:#c44800}.c-split{background:#b87000}
.c-tri{background:#1a3acc}.c-tet{background:#7700cc}.c-cua{background:#cc0077}.c-abs{background:#007755}

/* WEB Nivel 2 (>700px): Closet y Outfit aprovechan la pantalla grande (columna 1080px,
   grid 3-4 columnas, 2-3 looks lado a lado); Inicio y Cargar se quedan en 600px.
   Los elementos position:fixed se centran para no estirarse a todo el monitor. */
@media (min-width:700px){
  body{background:#eae5df}
  /* Todas las pestañas al mismo ancho (1080px), barra inferior alineada */
  .screen{max-width:1080px}
  .bottom-nav{left:50%;right:auto;transform:translateX(-50%);width:100%;max-width:1080px}
  #paso2-outfits{left:50%;right:auto;transform:translateX(-50%);width:100%;max-width:1080px}
  /* Hero de Inicio a pantalla completa (estilo Zara web) */
  #screen-inicio .slideshow{aspect-ratio:auto;height:calc(100vh - 62px)}
  .editorial-strip{display:grid;grid-template-columns:1fr 1fr;gap:2px}
  .items-grid{grid-template-columns:repeat(3,1fr)}
  .outfit-card{width:50%}
  .modal-overlay{align-items:center}
  .modal{max-height:85vh}
}
@media (min-width:1100px){
  .items-grid{grid-template-columns:repeat(4,1fr)}
  .outfit-card{width:33.3333%}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-mg">MG</div>
  <div class="splash-line"></div>
  <div class="splash-sub">Mi Guardarropa</div>
</div>


<!-- ══ INICIO ══ -->
<div id="screen-inicio" class="screen active">
  <div class="slideshow" id="slideshow">
    <div class="hero-txt">Mi<br>Guardarropa</div>
    <div class="slide active"><img src="slides/slide1.jpg" loading="eager" alt=""></div>
    <div class="slide slide-collage"><img src="slides/slide3.jpg" loading="lazy" alt=""><img src="slides/slide5.jpg" loading="lazy" alt=""><img src="slides/slide7.jpg" loading="lazy" alt=""></div>
    <div class="slide"><img src="slides/slide9.jpg" loading="lazy" alt=""></div>
    <div class="slide"><img src="slides/slide4.jpg" loading="lazy" alt=""></div>
    <div class="slide slide-collage"><img src="slides/slide8.jpg" loading="lazy" alt=""><img src="slides/slide11.jpg" loading="lazy" alt=""><img src="slides/slide10.jpg" loading="lazy" alt=""></div>
    <div class="slide"><img src="slides/slide6.jpg" loading="lazy" alt=""></div>
  </div>
  <div class="editorial-strip">
    <img src="slides/slide2.jpg" loading="lazy" alt="">
    <img src="slides/slide4.jpg" loading="lazy" alt="">
    <img src="slides/slide6.jpg" loading="lazy" alt="">
    <img src="slides/slide8.jpg" loading="lazy" alt="">
    <img src="slides/slide10.jpg" loading="lazy" alt="">
  </div>
  <div style="height:12px;background:#f5f0eb"></div>
</div>

<!-- ══ CLOSET ══ -->
<div id="screen-closet" class="screen">

  </div>

  </div>
  <div id="closet-color-wrap" style="display:none" class="dark-screen">

      <span class="back-title">Búsqueda por color</span>

    </div>
    <div id="desbloqueo-lista"></div>
  </div>
</div>

<!-- ══ OUTFIT ══ -->
<div id="screen-outfit" class="screen">
  <!-- Paso 1: elegir categoría -->
  <div id="paso1-wrap">
    <div id="outfit-main" class="dark-screen">
      <div style="padding:22px 20px 6px;text-align:center">
        <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#ff1a00;font-weight:300">Elige tu prenda</div>
      </div>
      <div id="outfit-cat-links"></div>
    </div>
    <div id="outfit-items-wrap" style="display:none">
      <div class="back-bar" onclick="volverOutfitMain()">
        <span class="back-arrow">‹</span>
        <span id="outfit-items-title" class="back-title"></span>
      </div>
      <div id="outfit-items-grid" class="items-grid"></div>
    </div>
  </div>

  <!-- Paso 2a: lista de armonías -->
  <div id="paso2-wrap" style="display:none">

        <span class="res-back" onclick="irPaso(1)">‹</span>

<!-- ══ CARGAR ══ -->
<div id="screen-cargar" class="screen">
  <div id="cargar-back-bar" class="back-bar" style="display:none" onclick="volverDesdeCargar()">
    <span class="back-arrow">‹</span>
    <span id="cargar-back-label" class="back-title"></span>
  </div>
  <div class="cargar-block">
    <div class="cargar-block-title">Nueva Prenda</div>
    <div style="padding:0 16px 16px">
      <button onclick="abrirModal()" style="width:100%;padding:14px;background:#fff;color:#000;border:none;font-size:10px;font-weight:400;letter-spacing:3px;text-transform:uppercase;cursor:pointer">+ Agregar Prenda</button>
    </div>
  </div>
  <div class="cargar-block" style="margin-top:2px">
    <div class="cargar-block-title">Buscar & Gestionar</div>
    <div class="search-wrap">
      <input class="search-inp" id="search-input" type="text" placeholder="Nombre, tipo o marca..." oninput="buscarPrenda(this.value)">
    </div>
    <div class="search-results" id="search-results"></div>
  </div>
  <div class="cargar-block" style="margin-top:2px">
    <button class="ajustes-toggle" onclick="toggleAjustes()">

        <div class="ajustes-sec-title">Datos</div>
        <div style="display:flex;gap:2px">
          <button onclick="exportarInventario()" style="flex:1;padding:12px;border:1px solid #e0dbd5;background:#fff;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer">Exportar</button>

      </div>
      <div class="ajustes-sec">
        <div class="ajustes-sec-title">Sincronización GitHub</div>

        <div class="ajustes-sec-title">Remove.bg — quitar fondo</div>

    </div>
  </div>
</div>

      if(matches[i].delta>30||matches[j].delta>30)continue;
      if(WADA[matches[i].idx].c.some(c=>WADA[matches[j].idx].c.includes(c)))return true;
    }
  }
  return false;
}

// COLOR ENGINE
function hexToHsl(hex){
  hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
  let r=parseInt(hex.slice(0,2),16)/255,g=parseInt(hex.slice(2,4),16)/255,b=parseInt(hex.slice(4,6),16)/255;
  let max=Math.max(r,g,b),min=Math.min(r,g,b),h=0,s=0,l=(max+min)/2;
  if(max!==min){let d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}
function hslToHex(h,s,l){
  h=((h%360)+360)%360;s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
  return'#'+f(0)+f(8)+f(4);
}
function esNeutro(hex){
  const{h,s,l}=hexToHsl(hex);
  if(s<15||l>85||l<10)return true;
  if(hueDist(h,220)<25&&l<35)return true;
  if(h>=25&&h<=55&&s>=12&&s<=45&&l>=50&&l<=82)return true;
  if(h>=50&&h<=80&&s>=10&&s<=40&&l>=30&&l<=60)return true;
  return false;
}
function hueDist(h1,h2){const d=Math.abs(h1-h2);return Math.min(d,360-d);}
function getHuesObjetivo(hAncla,arm){
  switch(arm){
    case'analoga':return[(hAncla+30)%360,(hAncla+330)%360];
    case'complementaria':return[(hAncla+180)%360];
    case'split':return[(hAncla+150)%360,(hAncla+210)%360];
    case'triadica':return[(hAncla+120)%360,(hAncla+240)%360];
    case'tetradica':return[(hAncla+60)%360,(hAncla+180)%360,(hAncla+240)%360];
    case'cuadrada':return[(hAncla+90)%360,(hAncla+180)%360,(hAncla+270)%360];
    case'abstracta':return[(hAncla+30)%360,(hAncla+150)%360,(hAncla+210)%360];
    default:return[];
  }
}
const TOLERANCIA=15;
// Colores de una prenda: principal + hasta 2 opcionales (rayas/estampados = combinación de fábrica)
function coloresDe(p){return[p.color,p.color2,p.color3].filter(Boolean);}
function esCompatible(pHex,huesObj,anclaHex){
  if(pHex===anclaHex)return false;
  if(esNeutro(pHex))return false;
  const{h}=hexToHsl(pHex);
  const{h:hAncla}=hexToHsl(anclaHex);
  return huesObj.some(hObj=>hueDist(h,hObj)<=TOLERANCIA)||hueDist(h,hAncla)<=TOLERANCIA;
}

// GENERADOR
function generarParaArmonia(anclaRef,armKey){
  const{h:hAncla}=hexToHsl(anclaRef.color);
  const huesObj=getHuesObjetivo(hAncla,armKey);
  const otras=inventario.filter(p=>p.id!==anclaRef.id);
  // Pre-check: cada ángulo objetivo debe tener al menos una prenda real en el inventario
  // (una prenda cuenta por cualquiera de sus dos colores)
  for(const th of huesObj){
    if(!otras.some(p=>coloresDe(p).some(c=>!esNeutro(c)&&hueDist(hexToHsl(c).h,th)<=TOLERANCIA)))return[];
  }
  function pool(pos){
    const all=otras.filter(p=>getPosicion(p.tipo)===pos);
    const compat=all.filter(p=>coloresDe(p).some(c=>esCompatible(c,huesObj,anclaRef.color)));
    if(compat.length)return compat;
    // Solo neutros como fallback — nunca "todo" para no inventar outfits
    return all.filter(p=>coloresDe(p).every(c=>esNeutro(c)));
  }
  const anclaPos=getPosicion(anclaRef.tipo);
  const sup=pool('superior'),ext=pool('exterior'),inf=pool('inferior'),cal=pool('calzado'),acc=pool('accesorios');
  const outfits=[];
  function push(piezas,nivel){
    if(!piezas.some(p=>getPosicion(p.tipo)==='calzado')&&cal.length)piezas=[...piezas,cal[outfits.length%cal.length]];
    if(acc.length&&!piezas.some(p=>getPosicion(p.tipo)==='accesorios'))piezas=[...piezas,acc[outfits.length%acc.length]];
    outfits.push({nivel,piezas,armKey,anclaColor:anclaRef.color});
  }
  if(anclaPos==='superior'){inf.forEach(i=>{push([anclaRef,i],'basico');ext.forEach(e=>push([e,anclaRef,i],'exterior'));});}
  else if(anclaPos==='exterior'){sup.forEach(s=>inf.forEach(i=>push([anclaRef,s,i],'exterior')));}
  else if(anclaPos==='inferior'){sup.forEach(s=>{push([s,anclaRef],'basico');ext.forEach(e=>push([e,s,anclaRef],'exterior'));});}
  else if(anclaPos==='calzado'){sup.forEach(s=>inf.forEach(i=>{push([s,i,anclaRef],'basico');ext.forEach(e=>push([e,s,i,anclaRef],'exterior'));}));}
  else if(anclaPos==='accesorios'){sup.forEach(s=>inf.forEach(i=>{push([s,i,anclaRef],'basico');ext.forEach(e=>push([e,s,i,anclaRef],'exterior'));}));}
  const seen=new Set();
  return outfits.filter(o=>{const k=o.piezas.map(p=>p.id).sort().join('-');if(seen.has(k))return false;seen.add(k);return true;});
}

// DESBLOQUEO DE LOOKS — qué colores faltan y cuántos looks nuevos daría comprar cada uno
function analizarDesbloqueos(){
  const NOMBRES={0:'Rojo',30:'Naranja',60:'Amarillo',90:'Lima',120:'Verde',150:'Esmeralda',180:'Cian',210:'Azul',240:'Índigo',270:'Violeta',300:'Magenta',330:'Rosa'};
  const claveDe=o=>o.piezas.map(p=>p.id).sort().join('-');
  const contar=()=>{
    const s=new Set();
    inventario.filter(p=>['superior','exterior','inferior'].includes(getPosicion(p.tipo)))
      .forEach(ref=>ARMONIAS.forEach(a=>generarParaArmonia(ref,a.key).forEach(o=>s.add(claveDe(o)))));
    return s;
  };
  const base=contar();
  const res=[];
  for(let h=0;h<360;h+=30){
    // Saltar tonos que el closet ya cubre
    if(inventario.some(p=>coloresDe(p).some(c=>!esNeutro(c)&&hueDist(hexToHsl(c).h,h)<=TOLERANCIA)))continue;
    const swatch=hslToHex(h,65,48);
    let mejor=0;
    // Probar la prenda virtual como superior y como inferior; tomar el mejor caso
    for(const tipo of ['Camiseta','Pantalón']){
      inventario.push({id:-1,nombre:'',tipo,color:swatch,formalidad:'casual'});
      const con=contar();
      inventario.pop();
      let nuevos=0;con.forEach(k=>{if(!base.has(k))nuevos++;});
      mejor=Math.max(mejor,nuevos);
    }
    if(mejor>0)res.push({color:swatch,nombre:NOMBRES[h],looks:mejor});
  }
  return res.sort((a,b)=>b.looks-a.looks).slice(0,6);
}
function verDesbloqueos(){
  document.getElementById('closet-main').style.display='none';
  document.getElementById('closet-items-wrap').style.display='none';
  document.getElementById('closet-color-wrap').style.display='none';
  document.getElementById('closet-desbloqueo').style.display='block';
  document.body.style.overflow='';
  window.scrollTo(0,0);
  const lista=document.getElementById('desbloqueo-lista');
  lista.innerHTML='<div class="no-outfits"><p>Analizando tu closet…</p></div>';
  setTimeout(()=>{
    const res=analizarDesbloqueos();
    lista.innerHTML=(res.length
      ?res.map(r=>{
        const txt=hexToHsl(r.color).l>55?'#000':'#fff';
        return`<div class="desb-franja" style="background:${r.color};color:${txt}">
          <div><div class="desb-nombre">${r.nombre}</div><div class="desb-hex">${r.color}</div></div>
          <div class="desb-num">+${r.looks}</div>
        </div>`;
      }).join('')
      :'<div class="no-outfits"><p>Tu closet ya cubre todos los ángulos de color</p></div>')
      +'<div class="desb-nota">Looks nuevos que obtienes si agregas una prenda de ese color. Usa el tono como referencia de compra.</div>';
  },30);
}

function lookCardHTML(o,wadaOk=false,armNombre=null){
  const piezas=o.piezas;
  let colores;
  const _huesObj=o.armKey&&o.anclaColor?getHuesObjetivo(hexToHsl(o.anclaColor).h,o.armKey):null;
  if(o.armKey&&o.anclaColor&&_huesObj&&_huesObj.length){
    const{h:hAncla}=hexToHsl(o.anclaColor);
    const positions=[hAncla,..._huesObj];
    // Colores reales no-neutros (incluye color secundario de prendas multicolor)
    const nonNeutral=[];
    piezas.forEach(p=>coloresDe(p).forEach(c=>{if(!esNeutro(c))nonNeutral.push(c);}));
    // Asignar cada color a su posición harmónica más cercana
    const buckets=positions.map(()=>[]);
    nonNeutral.forEach(c=>{
      const ph=hexToHsl(c).h;
      let minD=Infinity,minI=0;
      positions.forEach((pos,i)=>{const d=hueDist(ph,pos);if(d<minD){minD=d;minI=i;}});
      buckets[minI].push(c);
    });
    // Un color por posición: real si existe, teórico como fallback
    const{s:sA,l:lA}=hexToHsl(o.anclaColor);
    const vs=Math.max(sA,55),vl=Math.min(Math.max(lA,35),62);
    colores=buckets.map((bucket,i)=>{
      if(bucket.length)return bucket.reduce((best,c)=>hueDist(hexToHsl(c).h,positions[i])<hueDist(hexToHsl(best).h,positions[i])?c:best);
      return hslToHex(positions[i],vs,vl);
    });
  }else{
    colores=[...new Set(piezas.flatMap(p=>coloresDe(p)).filter(c=>!esNeutro(c)))];
    if(!colores.length)colores=[...new Set(piezas.map(p=>p.color))];
  }
  const left=[
    ...piezas.filter(p=>getPosicion(p.tipo)==='exterior'),
    ...piezas.filter(p=>getPosicion(p.tipo)==='superior'),
    ...piezas.filter(p=>getPosicion(p.tipo)==='inferior'),
  ];
  const right=[
    ...piezas.filter(p=>getPosicion(p.tipo)==='calzado'),
    ...piezas.filter(p=>ACC_CABEZA.includes(p.tipo)),
    ...piezas.filter(p=>ACC_CUERPO.includes(p.tipo)),
  ];
  function imgOf(p,cls){return`<div class="${cls}">${p.foto?`<img src="${p.foto}" alt="">`:`<div class="of-color" style="background:${p.color}">${tipoIcon(p.tipo)}</div>`}</div>`;}
  const leftHTML=left.length?`<div class="of-left">${left.map(p=>imgOf(p,'of-left-item')).join('')}</div>`:'';
  const rightHTML=right.length?`<div class="of-right">${right.map(p=>imgOf(p,'of-right-item')).join('')}</div>`:'';
  const favK=piezas.map(p=>p.id).sort().join('-');
  const esFav=_favs.includes(favK);
  return`<div class="outfit-card${wadaOk?' wada-ok':''}">${wadaOk?'<div class="wada-badge">W</div>':''}<button class="fav-btn${esFav?' on':''}" data-key="${favK}" onclick="toggleFav(event,this)">${esFav?'♥':'♡'}</button><div class="outfit-body">${leftHTML}${rightHTML}</div><div class="outfit-paleta">${colores.map(c=>`<div class="paleta-seg" style="background:${c}"></div>`).join('')}</div></div>`;
}

function fotoAreaClick(ev){
  if(!_goteroActivo){document.getElementById('input-foto').click();return;}
  const img=document.getElementById('preview-foto');
  const r=img.getBoundingClientRect();
  const nw=img.naturalWidth,nh=img.naturalHeight;
  if(!nw||ev.clientX<r.left||ev.clientX>r.right||ev.clientY<r.top||ev.clientY>r.bottom)return;
  // object-fit:contain — mapear el punto tocado al pixel real de la imagen
  const scale=Math.min(r.width/nw,r.height/nh);
  const dw=nw*scale,dh=nh*scale;
  const ox=r.left+(r.width-dw)/2,oy=r.top+(r.height-dh)/2;
  const x=Math.floor((ev.clientX-ox)/scale),y=Math.floor((ev.clientY-oy)/scale);
  if(x<0||y<0||x>=nw||y>=nh){showToast('Toca sobre la prenda');return;}
  const c=document.createElement('canvas');c.width=nw;c.height=nh;
  const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
  let d;
  try{d=ctx.getImageData(x,y,1,1).data;}
  catch(e){showToast('No se pudo leer el color de esta foto');desactivarGotero();return;}
  if(d[3]<50){showToast('Zona transparente — toca sobre la prenda');return;}
  const hexv='#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
  setColorCampo(_goteroActivo,hexv);
  showToast('Color tomado · '+hexv);
  document.getElementById('foto-status').textContent='';
  desactivarGotero();
}
async function normalizarProporcion(dataUrl,targetW=1200,targetH=1600,fill=0.90){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const tmp=document.createElement('canvas');
      tmp.width=img.width;tmp.height=img.height;
      const ctx=tmp.getContext('2d');ctx.drawImage(img,0,0);
      const d=ctx.getImageData(0,0,img.width,img.height).data;
      let minX=img.width,maxX=0,minY=img.height,maxY=0,found=false;
      for(let y=0;y<img.height;y++)for(let x=0;x<img.width;x++){
        if(d[(y*img.width+x)*4+3]>30){
          if(x<minX)minX=x;if(x>maxX)maxX=x;
          if(y<minY)minY=y;if(y>maxY)maxY=y;found=true;
        }
      }
      if(!found){resolve(dataUrl);return;}
      const cw=maxX-minX+1,ch=maxY-minY+1;
      const px=Math.floor(cw*0.05),py=Math.floor(ch*0.05);
      const l=Math.max(0,minX-px),t=Math.max(0,minY-py);
      const r=Math.min(img.width-1,maxX+px),b=Math.min(img.height-1,maxY+py);
      const cropW=r-l+1,cropH=b-t+1;
      let scale=cropW>=cropH?targetW*fill/cropW:targetH*fill/cropH;
      scale=Math.min(scale,targetW*0.96/cropW,targetH*0.96/cropH);
      const nw=Math.floor(cropW*scale),nh=Math.floor(cropH*scale);
      const out=document.createElement('canvas');
      out.width=targetW;out.height=targetH;
      const octx=out.getContext('2d');
      octx.drawImage(tmp,l,t,cropW,cropH,Math.floor((targetW-nw)/2),Math.floor((targetH-nh)/2),nw,nh);
      resolve(out.toDataURL('image/webp',0.85));
    };
    img.src=dataUrl;
  });
}
async function removerFondo(dataUrl){
  if(!rmbgKey())throw new Error('sin API key de remove.bg');
  const blob=await fetch(dataUrl).then(r=>r.blob());
  const fd=new FormData();fd.append('image_file',blob,'photo.jpg');fd.append('size','auto');
  const res=await fetch('https://api.remove.bg/v1.0/removebg',{method:'POST',headers:{'X-Api-Key':rmbgKey()},body:fd});
  if(!res.ok)throw new Error('removebg '+res.status);
  const buf=await res.arrayBuffer();const bytes=new Uint8Array(buf);
  let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  return'data:image/png;base64,'+btoa(bin);
}
function extraerColoresDominantes(imgEl,maxColors=4){
  try{
    const c=document.createElement('canvas');c.width=c.height=100;
    const ctx=c.getContext('2d');ctx.drawImage(imgEl,0,0,100,100);
    const d=ctx.getImageData(0,0,100,100).data;
    const map={};
    for(let i=0;i<d.length;i+=4){
      const a=d[i+3],r=d[i],g=d[i+1],b=d[i+2];
      if(a<128)continue;
      if(r>230&&g>230&&b>230)continue; // blanco/fondo
      const qr=Math.round(r/24)*24,qg=Math.round(g/24)*24,qb=Math.round(b/24)*24;
      const k=qr+','+qg+','+qb;map[k]=(map[k]||0)+1;
    }
    const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    const results=[];
    for(const[k]of sorted){
      const[r,g,b]=k.split(',').map(Number);
      const hex='#'+[r,g,b].map(x=>Math.min(255,x).toString(16).padStart(2,'0')).join('');
      const tooClose=results.some(h=>{
        const rr=parseInt(h.slice(1,3),16),rg=parseInt(h.slice(3,5),16),rb=parseInt(h.slice(5,7),16);
        return Math.abs(r-rr)+Math.abs(g-rg)+Math.abs(b-rb)<80;
      });
      if(!tooClose)results.push(hex);
      if(results.length>=maxColors)break;
    }
    return results;
  }catch(e){return[];}
}
function mostrarChipsColor(colores){

function cargarFoto(input){
  if(!input.files[0])return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const img=document.getElementById('preview-foto'),status=document.getElementById('foto-status');
    img.src=e.target.result;img.style.display='block';status.textContent='⏳ Quitando fondo...';
    try{
      const sinFondo=await removerFondo(e.target.result);
      status.textContent='⏳ Normalizando proporción...';
      const normalizado=await normalizarProporcion(sinFondo);
      img.src=normalizado;
      await new Promise(res=>{img.onload=res;img.onerror=res;});
      status.textContent='✓ Listo';
      mostrarChipsColor(extraerColoresDominantes(img));
    }catch(err){
      status.textContent='Toca para cambiar foto';
      const normalizado=await normalizarProporcion(e.target.result).catch(()=>e.target.result);
      img.src=normalizado;
      await new Promise(res=>{img.complete?res():(img.onload=img.onerror=res);});
      mostrarChipsColor(extraerColoresDominantes(img));
    }
  };reader.readAsDataURL(input.files[0]);
}

const TELAS=['Algodón','Lino','Lana','Seda','Bambú','Lyocell / Tencel','Viscosa','Gamuza','Cuero','Poliéster','Nylon','Spandex / Elastano'];
function addMaterialRow(tela='',pct=''){

  // corrompería el dato al guardar — normalizar o preservar la tela original
  let opts=TELAS;
  if(tela&&!TELAS.includes(tela)){
    const m=TELAS.find(t=>t.toLowerCase()===tela.toLowerCase())||TELAS.find(t=>t.toLowerCase().includes(tela.toLowerCase()));
    if(m)tela=m;else opts=[tela,...TELAS];

  div.innerHTML=`<select class="mat-sel">${opts.map(t=>`<option${t===tela?' selected':''}>${t}</option>`).join('')}</select><input type="number" class="mat-pct" min="1" max="100" value="${pct}" placeholder="%"  oninput="updateMaterialTotal()"><button type="button" class="mat-del" onclick="this.parentElement.remove();updateMaterialTotal()">×</button>`;
  rows.appendChild(div);updateMaterialTotal();

async function ghGet(path){
  const r=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`,
    {headers:{Authorization:`token ${ghToken()}`,Accept:'application/vnd.github.v3+json'}});
  if(!r.ok)return null;
  return r.json();
}
async function ghPut(path,base64Content,message,sha){
  const body={message,content:base64Content,branch:GH_BRANCH};
  if(sha)body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`,
    {method:'PUT',headers:{Authorization:`token ${ghToken()}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
     body:JSON.stringify(body)});
  return r.ok;
}
function dataUrlToBase64(dataUrl){return dataUrl.split(',')[1]||'';}
async function subirFotoGitHub(dataUrl,filename){
  const b64=dataUrlToBase64(dataUrl);
  if(!b64)return false;
  const existing=await ghGet(`images/${filename}`);
  return ghPut(`images/${filename}`,b64,`Add photo ${filename}`,existing?.sha);
}
async function subirJsonGitHub(){
  const existing=await ghGet('guardarropa.json');
  // Unir tombstones remotos para no pisar eliminaciones hechas desde otro dispositivo
  if(existing&&existing.content){
    try{
      const remote=JSON.parse(decodeURIComponent(escape(atob(existing.content.replace(/\n/g,'')))));
      const remoteDel=Array.isArray(remote)?[]:(remote.deleted||[]);
      remoteDel.forEach(id=>{if(!_tombstones.includes(id))_tombstones.push(id);});
    }catch(e){}
  }
  const antes=inventario.length;
  inventario=inventario.filter(p=>!_tombstones.includes(p.id));
  if(inventario.length!==antes)guardarLocal();
  const content=btoa(unescape(encodeURIComponent(JSON.stringify({prendas:inventario,deleted:_tombstones,favs:_favs},null,2))));
  return ghPut('guardarropa.json',content,'Update inventory',existing?.sha);
}
async function ghDelete(path,message){
  const existing=await ghGet(path);
  if(!existing)return true;
  const r=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`,
    {method:'DELETE',headers:{Authorization:`token ${ghToken()}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
     body:JSON.stringify({message,sha:existing.sha,branch:GH_BRANCH})});
  return r.ok;
}
// ── Sync centralizado: toda mutación (alta/edición/eliminación) pasa por aquí ──
// Sube primero las fotos pendientes (base64) y luego el JSON completo.
// Si algo falla (sin conexión), marca wrd_dirty y se reintenta al arrancar.
let _syncEnCurso=false;
function _pendDel(){return JSON.parse(localStorage.getItem('wrd_pending_del')||'[]');}
async function sincronizarInventario(silencioso){
  if(!ghToken()){if(!silencioso)showToast('Guardado local — configura token para sincronizar');return false;}
  if(_syncEnCurso){localStorage.setItem('wrd_dirty','1');return false;}
  _syncEnCurso=true;
  if(!silencioso)showToast('⏳ Sincronizando...');
  try{
    const pendSnapshot=_pendDel();
    // 1. Fotos pendientes: si una falla, abortar — el JSON nunca debe llevar base64
    for(const p of inventario){
      if(p.foto&&p.foto.startsWith('data:')){
        const filename=`user_${p.id}.webp`;
        const okFoto=await subirFotoGitHub(p.foto,filename).catch(()=>false);
        if(!okFoto){localStorage.setItem('wrd_dirty','1');if(!silencioso)showToast('⚠ Sin conexión — cambios guardados solo local');return false;}
        // ?v= evita que el SW (cache-first en imágenes) siga sirviendo la foto vieja tras una edición
        p.foto=`images/${filename}?v=${Date.now()}`;guardarLocal();
      }
    }
    // 2. JSON completo (fuente de verdad)
    const ok=await subirJsonGitHub().catch(()=>false);
    if(ok){
      localStorage.removeItem('wrd_dirty');
      const rest=_pendDel().filter(x=>!pendSnapshot.includes(x));
      if(rest.length)localStorage.setItem('wrd_pending_del',JSON.stringify(rest));
      else localStorage.removeItem('wrd_pending_del');
      if(!silencioso)showToast('✓ Sincronizado con GitHub');
    }else{
      localStorage.setItem('wrd_dirty','1');
      if(!silencioso)showToast('⚠ Sin conexión — cambios guardados solo local');
    }
    return ok;
  }finally{_syncEnCurso=false;}
}
async function guardarPrenda(){
  const nombre=document.getElementById('inp-nombre').value.trim(),tipo=document.getElementById('inp-tipo').value;
  const color=document.getElementById('inp-color').value,marca=document.getElementById('inp-marca').value.trim();
  const c2v=document.getElementById('inp-hex2').value.trim();
  const color2=/^#[0-9A-Fa-f]{6}$/.test(c2v)?c2v:null;
  const c3v=document.getElementById('inp-hex3').value.trim();
  const color3=/^#[0-9A-Fa-f]{6}$/.test(c3v)?c3v:null;
  const talla=document.getElementById('inp-talla').value.trim();
  const material=getMaterial();
  const formalidad=document.getElementById('inp-formalidad').value;
  const cuidado=getCuidado();
  const fotoEl=document.getElementById('preview-foto');
  // getAttribute: .src devolvería la URL absoluta y rompería rutas relativas al editar
  const fotoSrc=fotoEl.getAttribute('src');
  let foto=fotoSrc&&fotoEl.style.display!=='none'?fotoSrc:null;
  if(!nombre||!tipo){alert('Escribe el nombre y selecciona el tipo.');return;}
  if(material.length){const total=material.reduce((s,m)=>s+m.pct,0);if(total!==100){alert('Los porcentajes de tela deben sumar 100% (ahora suman '+total+'%).');return;}}
  cerrarModal();
  if(editandoId){const idx=inventario.findIndex(p=>p.id===editandoId);if(idx>=0)inventario[idx]={...inventario[idx],nombre,tipo,color,color2,color3,marca,talla,material,cuidado,formalidad,foto,pos:getPosicion(tipo)};}
  else{inventario.push({id:Date.now(),nombre,tipo,color,color2,color3,marca,talla,material,cuidado,formalidad,foto,pos:getPosicion(tipo)});}
  guardarLocal();renderClosetMain();renderOutfitMain();
  // Sync centralizado: sube foto pendiente (si hay) + JSON, en altas y ediciones
  await sincronizarInventario();
}

function importarInventario(input){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const raw=JSON.parse(e.target.result);
      const data=Array.isArray(raw)?raw:(Array.isArray(raw?.prendas)?raw.prendas:null);
      if(!data)throw new Error('formato');
      const valida=p=>p&&typeof p==='object'&&p.id!=null&&typeof p.nombre==='string'&&typeof p.tipo==='string'&&typeof p.color==='string';
      if(!data.length||!data.every(valida))throw new Error('estructura');
      inventario=data;guardarLocal();renderClosetMain();renderOutfitMain();
      alert('Importado: '+data.length+' prendas');
      sincronizarInventario();
    }catch(err){alert('Error al importar: el archivo no tiene el formato esperado.');}
  };
  r.readAsText(input.files[0]);
}

// SLIDESHOW
let slideIdx=0,slideTimer=null;
function initSlideshow(){
  const slides=document.querySelectorAll('.slide');if(!slides.length)return;
  function goTo(n){slides[slideIdx].classList.remove('active');slideIdx=(n+slides.length)%slides.length;slides[slideIdx].classList.add('active');}
  slideTimer=setInterval(()=>goTo(slideIdx+1),2800);
  let tx=0;const ss=document.getElementById('slideshow');
  ss.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
  ss.addEventListener('touchend',e=>{const diff=tx-e.changedTouches[0].clientX;if(Math.abs(diff)>50){clearInterval(slideTimer);goTo(slideIdx+(diff>0?1:-1));slideTimer=setInterval(()=>goTo(slideIdx+1),2800);}},{passive:true});
}

function showScreen(id){

  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));

// Siempre sincronizar con guardarropa.json como fuente de verdad
fetch('guardarropa.json').then(r=>r.json()).then(data=>{
  // Formato nuevo {prendas, deleted} o legado (array plano)
  let jsonData=Array.isArray(data)?data:(data.prendas||[]);
  _tombstones=Array.isArray(data)?[]:(data.deleted||[]);
  if(!Array.isArray(data)&&Array.isArray(data.favs)){_favs=data.favs;localStorage.setItem('wrd_favs',JSON.stringify(_favs));}
  const pendDel=JSON.parse(localStorage.getItem('wrd_pending_del')||'[]');
  // No revivir prendas eliminadas (en otro dispositivo o pendientes de subir)
  pendDel.forEach(id=>{if(!_tombstones.includes(id))_tombstones.push(id);});
  jsonData=jsonData.filter(j=>!_tombstones.includes(j.id));
  // Preservar prendas añadidas por el usuario desde la app (ID tipo timestamp)
  const userAdded=inventario.filter(p=>!jsonData.find(j=>j.id===p.id)&&!_tombstones.includes(p.id));
  inventario=[...jsonData,...userAdded];
  guardarLocal();renderClosetMain();renderOutfitMain();
  // Reintentar sync pendiente (cambios hechos sin conexión o con fallo previo)
  if((localStorage.getItem('wrd_dirty')||pendDel.length)&&ghToken())sincronizarInventario(true);
}).catch(()=>{renderClosetMain();renderOutfitMain();});
