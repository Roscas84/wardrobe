<html lang="es">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;color:#1a1a1a;min-height:100vh;padding-bottom:80px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;padding:10px 0;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;cursor:pointer;font-size:10px;color:#888}
.bnav-btn.active{color:#007aff}
.bnav-icon{font-size:22px}

header{background:#fff;border-bottom:1px solid #e0e0e0;padding:14px 16px;position:sticky;top:0;z-index:100}
header h1{font-size:17px;font-weight:700}

.screen{display:none;padding:16px;max-width:600px;margin:0 auto}
.screen.active{display:block}

/* INVENTARIO */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.top-bar h2{font-size:15px;font-weight:600;color:#888}
.btn-add{background:#007aff;color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:13px;cursor:pointer;font-weight:500}

/* CATEGORIAS */
.categoria-section{margin-bottom:8px;background:#fff;border-radius:14px;overflow:hidden;border:1px solid #e0e0e0}
.categoria-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;font-size:14px;font-weight:600}
.categoria-header .count{font-size:12px;color:#888;font-weight:400}
.categoria-arrow{font-size:12px;color:#888;transition:transform .2s}
.categoria-arrow.open{transform:rotate(90deg)}
.categoria-items{display:none;padding:0 10px 10px}
.categoria-items.open{display:grid;grid-template-columns:1fr;gap:8px}

.prenda-card{background:#f8f8f8;border-radius:10px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:all .15s;position:relative}
.prenda-card:active{opacity:0.8}
.prenda-card.selected{border-color:#007aff}
.prenda-img{width:100%;aspect-ratio:3/5;object-fit:cover;background:#e8e8e8}
.prenda-placeholder{width:100%;aspect-ratio:3/5;display:flex;align-items:center;justify-content:center;font-size:28px}
.prenda-info{padding:8px}
.prenda-nombre{font-size:11px;font-weight:600;line-height:1.3;margin-bottom:2px}
.prenda-meta{font-size:10px;color:#888;display:flex;align-items:center;gap:4px}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,0.1)}
.prenda-actions{position:absolute;top:6px;right:6px;display:flex;gap:6px}
.prenda-action-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;opacity:0.9;box-shadow:0 1px 4px rgba(0,0,0,0.18)}
.btn-edit-p{background:#fff}
.btn-del-p{background:#ff3b30;color:#fff}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:0.3px}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid #e0e0e0;border-radius:10px;font-size:15px;background:#fff;-webkit-appearance:none}
.foto-area{border:2px dashed #e0e0e0;border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:14px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.foto-area img{width:100%;max-height:200px;object-fit:contain;border-radius:8px}
.foto-area p{font-size:13px;color:#888;margin-top:6px}
.modal-btns{display:flex;gap:10px;margin-top:8px;padding-bottom:env(safe-area-inset-bottom)}
.btn-cancel{flex:1;padding:13px;border:1px solid #e0e0e0;border-radius:12px;background:#fff;font-size:15px;cursor:pointer}
.btn-save{flex:2;padding:13px;border:none;border-radius:12px;background:#007aff;color:#fff;font-size:15px;cursor:pointer;font-weight:600}

.color-row{display:flex;align-items:center;gap:10px}
.color-swatch{width:44px;height:44px;border-radius:10px;border:1px solid #e0e0e0;cursor:pointer;flex-shrink:0}

.paso-title{font-size:20px;font-weight:700;margin-bottom:4px}

/* RESULTADOS */
.resultados-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

/* Secciones de armonía — estilo categorías */

/* OUTFIT CARD — 2 COLUMNAS, BODY ORDER */
.outfit-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);border:1px solid #ebebeb}
.outfit-col{display:flex;flex-direction:column;gap:1px;background:rgba(0,0,0,0.05)}
.of-item{overflow:hidden;width:100%;background:#f7f5f2}

.no-outfits{text-align:center;padding:40px 20px;color:#888}
.no-outfits p{font-size:14px;margin-top:8px}

/* BADGE LIBRE */

/* DATOS */
.data-section{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;margin-top:8px}
.data-section h3{font-size:14px;font-weight:600;margin-bottom:10px}
.data-btns{display:flex;gap:8px;flex-wrap:wrap}
.data-btn{flex:1;padding:10px;border:1px solid #e0e0e0;border-radius:10px;background:#fff;font-size:13px;cursor:pointer;text-align:center;font-weight:500}

/* ARM COLORS */
.c-ana   {background:#1a7a1a}
.c-comp  {background:#c44800}
.c-split {background:#b87000}
.c-tri   {background:#1a3acc}
.c-tet   {background:#7700cc}
.c-cua   {background:#cc0077}
.c-abs   {background:#007755}
</style>

<body>

<header><h1>👔 Mi Guardarropa</h1></header>

<!-- INVENTARIO -->

          <option value="Bota">Bota</option>

<!-- NAV -->

    <span class="bnav-icon">👕</span>Inventario

<script>
// ======== ESTADO ========
let inventario = JSON.parse(localStorage.getItem('wrd_inv') || '[]');
let ancla = null;
let modoLibreActivo = false;
let editandoId = null;

const CATEGORIAS = [
  { key:'superior',   label:'👕 Superior',   tipos:['Camiseta','Camisa','Hoodie','Polo','Sudadera','Suéter','Tank top'] },
  { key:'exterior',   label:'🧥 Exterior',   tipos:['Blazer','Chamarra','Abrigo','Chaqueta'] },
  { key:'inferior',   label:'👖 Inferior',   tipos:['Jean','Jean largo','Jean tres cuartos','Pantalón','Overalls','Short','Jogger'] },
  { key:'calzado',    label:'👟 Calzado',    tipos:['Sneakers','Converse','Botas','Bota','Zapato','Sandalias','Sandalia','Mocasín'] },
  { key:'accesorios', label:'🎩 Accesorios', tipos:['Gorra','Bolso','Lentes','Cinturón','Bufanda','Reloj'] },
];

const ARMONIAS = [
  { key:'analoga',        nombre:'Análoga',           dotClass:'c-ana',  color:'#1a7a1a', desc:'Colores vecinos (±30°)' },
  { key:'complementaria', nombre:'Complementaria',    dotClass:'c-comp', color:'#c44800', desc:'Colores opuestos · máximo contraste' },
  { key:'split',          nombre:'Split Comp.',       dotClass:'c-split',color:'#b87000', desc:'Dos colores junto al complementario' },
  { key:'triadica',       nombre:'Triádica',          dotClass:'c-tri',  color:'#1a3acc', desc:'Tres colores equidistantes (120°)' },
  { key:'tetradica',      nombre:'Tetrádica',         dotClass:'c-tet',  color:'#7700cc', desc:'Rectángulo en la rueda (60°+180°+240°)' },
  { key:'cuadrada',       nombre:'Cuadrada',          dotClass:'c-cua',  color:'#cc0077', desc:'Cuatro colores en cuadrado (90°)' },
  { key:'abstracta',      nombre:'Abstracta',         dotClass:'c-abs',  color:'#007755', desc:'Doble split complementaria (30°+150°+210°)' },
];

function getPosicion(tipo) {
  if(['Jean','Jean largo','Jean tres cuartos','Pantalón','Overalls','Short','Jogger'].includes(tipo)) return 'inferior';
  if(['Blazer','Chamarra','Abrigo','Chaqueta'].includes(tipo)) return 'exterior';
  if(['Sneakers','Converse','Botas','Bota','Zapato','Sandalias','Sandalia','Mocasín'].includes(tipo)) return 'calzado';
  if(['Gorra','Bolso','Lentes','Cinturón','Bufanda','Reloj'].includes(tipo)) return 'accesorios';
  return 'superior';
}

function guardarLocal() { localStorage.setItem('wrd_inv', JSON.stringify(inventario)); }

// ======== COLOR ENGINE ========
function hexToHsl(hex) {
  hex = hex.replace('#','');
  if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  let r=parseInt(hex.slice(0,2),16)/255, g=parseInt(hex.slice(2,4),16)/255, b=parseInt(hex.slice(4,6),16)/255;
  let max=Math.max(r,g,b), min=Math.min(r,g,b), h=0, s=0, l=(max+min)/2;
  if(max!==min){
    let d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}
    h/=6;
  }
  return {h:Math.round(h*360), s:Math.round(s*100), l:Math.round(l*100)};
}

function esNeutro(hex) {
  const {h, s, l} = hexToHsl(hex);
  if(s < 15)  return true; // Negro, blanco, grises
  if(l > 85)  return true; // Blanco / crema
  if(l < 10)  return true; // Negro profundo
  // Navy (azul oscuro — neutro de moda)
  if(hueDist(h, 220) < 25 && l < 35) return true;
  // Beige / camel / arena
  if(h >= 25 && h <= 55 && s >= 12 && s <= 45 && l >= 50 && l <= 82) return true;
  // Khaki / verde olivo neutro
  if(h >= 50 && h <= 80 && s >= 10 && s <= 40 && l >= 30 && l <= 60) return true;
  return false;
}

function hueDist(h1,h2) { const d=Math.abs(h1-h2); return Math.min(d,360-d); }

function getHuesObjetivo(hAncla, arm) {
  switch(arm) {
    case 'analoga':        return [(hAncla+30)%360,(hAncla+330)%360];
    case 'complementaria': return [(hAncla+180)%360];
    case 'split':          return [(hAncla+150)%360,(hAncla+210)%360];
    case 'triadica':       return [(hAncla+120)%360,(hAncla+240)%360];
    case 'tetradica':      return [(hAncla+60)%360,(hAncla+180)%360,(hAncla+240)%360];
    case 'cuadrada':       return [(hAncla+90)%360,(hAncla+180)%360,(hAncla+270)%360];
    case 'abstracta':      return [(hAncla+30)%360,(hAncla+150)%360,(hAncla+210)%360];
  }
}

const TOLERANCIA = 28;

function esCompatible(pHex, huesObj, anclaHex) {
  if(pHex === anclaHex) return false;
  if(esNeutro(pHex)) return true;
  const {h} = hexToHsl(pHex);
  return huesObj.some(hObj => hueDist(h, hObj) <= TOLERANCIA);
}

// ======== GENERADOR ========
function generarParaArmonia(anclaRef, armKey) {
  const huesObj = getHuesObjetivo(hexToHsl(anclaRef.color).h, armKey);
  const otras = inventario.filter(p => p.id !== anclaRef.id);

  function pool(pos) {
    const all = otras.filter(p => getPosicion(p.tipo) === pos);
    const c = all.filter(p => esCompatible(p.color, huesObj, anclaRef.color));
    return c.length ? c : all;
  }

  const anclaPos = getPosicion(anclaRef.tipo);
  const sup = pool('superior');
  const ext = pool('exterior');
  const inf = pool('inferior');
  const cal = pool('calzado');
  const acc = pool('accesorios');

  const outfits = [];

  function push(piezas, nivel) {
    // Añade un zapato compatible (rota entre los disponibles)
    if (!piezas.some(p => getPosicion(p.tipo) === 'calzado') && cal.length) {
      piezas = [...piezas, cal[outfits.length % cal.length]];
    }
    // Añade accesorio solo en 1 de cada 3 outfits para no duplicar
    if (acc.length && outfits.length % 3 === 1 && !piezas.some(p => getPosicion(p.tipo) === 'accesorios')) {
      piezas = [...piezas, acc[outfits.length % acc.length]];
    }
    outfits.push({nivel, piezas});
  }

  if(anclaPos === 'superior') {
    inf.forEach(i => {
      push([anclaRef, i], 'basico');
      ext.forEach(e => push([e, anclaRef, i], 'exterior'));
    });
  } else if(anclaPos === 'exterior') {
    sup.forEach(s => inf.forEach(i => push([anclaRef, s, i], 'exterior')));
  } else if(anclaPos === 'inferior') {
    sup.forEach(s => {
      push([s, anclaRef], 'basico');
      ext.forEach(e => push([e, s, anclaRef], 'exterior'));
    });
  } else if(anclaPos === 'calzado') {
    sup.forEach(s => inf.forEach(i => {
      push([s, i, anclaRef], 'basico');
      ext.forEach(e => push([e, s, i, anclaRef], 'exterior'));
    }));
  } else if(anclaPos === 'accesorios') {
    sup.forEach(s => inf.forEach(i => {
      push([s, i, anclaRef], 'basico');
      ext.forEach(e => push([e, s, i, anclaRef], 'exterior'));
    }));
  }

  // Deduplicar dentro de la armonía
  const seen = new Set();
  const dedup = outfits.filter(o => {
    const k = o.piezas.map(p=>p.id).sort().join('-');
    if(seen.has(k)) return false;
    seen.add(k); return true;
  });

  return dedup;
}

function generarTodosLosLooks(anclaRef) {
  return ARMONIAS.map(arm => ({ arm, outfits: generarParaArmonia(anclaRef, arm.key) }));
}

// ======== INVENTARIO ========
function renderInventario() {
  document.getElementById('inv-count').textContent = inventario.length + ' prendas';
  const wrap = document.getElementById('categorias-wrap');
  wrap.innerHTML = '';

    const sec = document.createElement('div');
    sec.className = 'categoria-section';
    sec.innerHTML = `
      <div class="categoria-header" onclick="toggleCat(this)">
        <span>${cat.label} <span class="count">(${items.length})</span></span>
        <span class="categoria-arrow open">›</span>
      </div>
      <div class="categoria-items open">

    wrap.appendChild(sec);

function prendaCardHTML(p) {
  return `
  <div class="prenda-card" id="pc${p.id}">
    ${p.foto ? '<img class="prenda-img" src="'+p.foto+'" onclick="selAnclaMobile('+p.id+')">'
             : '<div class="prenda-placeholder" style="background:'+p.color+'" onclick="selAnclaMobile('+p.id+')">👕</div>'}
    <div class="prenda-info" onclick="selAnclaMobile(${p.id})">
      <div class="prenda-nombre">${p.nombre}</div>
      <div class="prenda-meta"><span class="color-dot" style="background:${p.color}"></span>${p.tipo}</div>
    </div>
    <div class="prenda-actions">
      <button class="prenda-action-btn btn-edit-p" onclick="editarPrenda(${p.id})">✏️</button>
      <button class="prenda-action-btn btn-del-p" onclick="eliminarPrenda(${p.id})">✕</button>

function toggleCat(h) {
  h.querySelector('.categoria-arrow').classList.toggle('open');
  h.nextElementSibling.classList.toggle('open');
}

// ======== MODAL ========
function abrirModal() {
  editandoId = null;
  document.getElementById('modal-titulo').textContent = 'Agregar prenda';
  limpiarModal();
  document.getElementById('modal-prenda').classList.add('open');
}

function editarPrenda(id) {
  const p = inventario.find(x=>x.id===id); if(!p) return;
  editandoId = id;
  document.getElementById('modal-titulo').textContent = 'Editar prenda';
  document.getElementById('inp-nombre').value = p.nombre;
  document.getElementById('inp-tipo').value = p.tipo;
  document.getElementById('inp-color').value = p.color;
  document.getElementById('inp-hex').value = p.color;
  document.getElementById('inp-marca').value = p.marca||'';
  document.getElementById('inp-formalidad').value = p.formalidad;
  if(p.foto){ const img=document.getElementById('preview-foto'); img.src=p.foto; img.style.display='block'; }
  document.getElementById('modal-prenda').classList.add('open');
}

function eliminarPrenda(id) {
  if(!confirm('¿Eliminar esta prenda?')) return;
  inventario = inventario.filter(p=>p.id!==id);
  guardarLocal(); renderInventario(); renderCatAncla();
}

function cerrarModal() { document.getElementById('modal-prenda').classList.remove('open'); }

function limpiarModal() {
  ['inp-nombre','inp-marca'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('inp-tipo').value='';
  document.getElementById('inp-color').value='#000000';
  document.getElementById('inp-hex').value='#000000';
  document.getElementById('inp-formalidad').value='casual';
  const img=document.getElementById('preview-foto'); img.style.display='none'; img.src='';
}

function syncColor(origen) {
  if(origen==='picker') document.getElementById('inp-hex').value=document.getElementById('inp-color').value;
  else { const v=document.getElementById('inp-hex').value; if(/^#[0-9A-Fa-f]{6}$/.test(v)) document.getElementById('inp-color').value=v; }
}

const RMBG_KEY = 'Misp39S3s5vPZsMBwYcnA8s1';

async function removerFondo(dataUrl) {
  const blob = await fetch(dataUrl).then(r => r.blob());
  const fd = new FormData();
  fd.append('image_file', blob, 'photo.jpg');
  fd.append('size', 'auto');
  const res = await fetch('https://api.remove.bg/v1.0/removebg', {
    method: 'POST',
    headers: {'X-Api-Key': RMBG_KEY},
    body: fd
  });
  if(!res.ok) throw new Error('removebg ' + res.status);
  const buf = await res.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let bin = '';
  for(let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return 'data:image/png;base64,' + btoa(bin);
}

function extraerColor(imgEl) {
  try {
    const c=document.createElement('canvas'); c.width=c.height=60;
    const ctx=c.getContext('2d'); ctx.drawImage(imgEl,0,0,60,60);
    const d=ctx.getImageData(0,0,60,60).data;
    let r=0,g=0,b=0,n=0;
    for(let i=0;i<d.length;i+=4){
      if(d[i+3]<128) continue;
      r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++;
    }
    if(!n) return null;
    return '#'+[r,g,b].map(v=>Math.round(v/n).toString(16).padStart(2,'0')).join('');
  } catch(e){ return null; }
}

function cargarFoto(input) {
  if(!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const img = document.getElementById('preview-foto');
    const status = document.getElementById('foto-status');
    img.src = e.target.result;
    img.style.display = 'block';
    status.textContent = '⏳ Quitando fondo...';
    try {
      const sinFondo = await removerFondo(e.target.result);
      img.src = sinFondo;
      await new Promise(res => { img.onload = res; img.onerror = res; });
      status.textContent = '✓ Fondo eliminado';
    } catch(err) {
      status.textContent = 'Toca para cambiar foto';
    }
    const color = extraerColor(img);
    if(color) {
      document.getElementById('inp-color').value = color;
      document.getElementById('inp-hex').value = color;
    }
  };
  reader.readAsDataURL(input.files[0]);
}

function guardarPrenda() {
  const nombre=document.getElementById('inp-nombre').value.trim();
  const tipo=document.getElementById('inp-tipo').value;
  const color=document.getElementById('inp-color').value;
  const marca=document.getElementById('inp-marca').value.trim();
  const formalidad=document.getElementById('inp-formalidad').value;
  const fotoEl=document.getElementById('preview-foto');
  const foto=fotoEl.src&&fotoEl.style.display!=='none'?fotoEl.src:null;
  if(!nombre||!tipo){ alert('Escribe el nombre y selecciona el tipo.'); return; }
  const pos=getPosicion(tipo);
  if(editandoId) {
    const idx=inventario.findIndex(p=>p.id===editandoId);
    if(idx>=0) inventario[idx]={...inventario[idx],nombre,tipo,color,marca,formalidad,foto,pos};
  } else {
    inventario.push({id:Date.now(),nombre,tipo,color,marca,formalidad,foto,pos});
  }
  guardarLocal(); renderInventario(); renderCatAncla(); cerrarModal();
}

// ======== EXPORT / IMPORT ========
function exportarInventario() {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(inventario)],{type:'application/json'}));
  a.download='guardarropa.json'; a.click();
}

function importarInventario(input) {
  const r=new FileReader();
  r.onload=e=>{ try{
    const data=JSON.parse(e.target.result);
    if(Array.isArray(data)){ inventario=data; guardarLocal(); renderInventario(); renderCatAncla(); alert('Importado: '+data.length+' prendas'); }
  }catch(err){ alert('Error al importar.'); }};
  r.readAsText(input.files[0]);
}

// ======== CONSTRUCTOR ========
function renderCatAncla() {
  const wrap=document.getElementById('ancla-categorias'); wrap.innerHTML='';
  CATEGORIAS.forEach(cat=>{
    const items=inventario.filter(p=>getPosicion(p.tipo)===cat.key); if(!items.length) return;
    const sec=document.createElement('div'); sec.className='categoria-section';
    sec.innerHTML=`
      <div class="categoria-header" onclick="toggleCat(this)">
        <span>${cat.label} <span class="count">(${items.length})</span></span>
        <span class="categoria-arrow">›</span>
      </div>
      <div class="categoria-items">
        ${items.map(p=>`
          <div class="prenda-card${ancla&&ancla.id===p.id?' selected':''}" onclick="selAncla(${p.id})">
            ${p.foto?'<img class="prenda-img" src="'+p.foto+'">':`<div class="prenda-placeholder" style="background:${p.color}">👕</div>`}
            <div class="prenda-info">
              <div class="prenda-nombre">${p.nombre}</div>
              <div class="prenda-meta"><span class="color-dot" style="background:${p.color}"></span>${p.tipo}</div>
            </div>
          </div>`).join('')}
      </div>`;
    wrap.appendChild(sec);
  });
}

function selAncla(id) {
  ancla = inventario.find(p=>p.id===id);
  modoLibreActivo = false;
  mostrarLooks();
}

function selAnclaMobile(id) {
  ancla=inventario.find(p=>p.id===id);
  showScreen('constructor');
  setTimeout(()=>{ renderCatAncla(); },50);
}

function irPaso(n) {
  ['paso1-wrap','paso2-wrap'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('paso'+n+'-wrap').style.display='block';
  window.scrollTo(0,0);
}

function chipAnclaHTML(p) {
  return `<div class="ancla-chip">
    ${p.foto
      ? '<img class="ancla-thumb" src="'+p.foto+'" alt="">'
      : '<div class="ancla-thumb-color" style="background:'+p.color+'"></div>'}
    <button class="ancla-cambiar-btn" onclick="irPaso(1)">← Cambiar prenda</button>
  </div>`;
}

function activarModoLibre() {
  modoLibreActivo = true;
  ancla = null;
  showScreen('constructor');
  mostrarLooks();
}

function mostrarLooks() {
  irPaso(2);

  // Chip ancla o badge libre
  const chipEl = document.getElementById('ancla-chip-res');
  if(modoLibreActivo) {
    chipEl.innerHTML = `<div class="ancla-chip">
      <div style="flex:1;display:flex;align-items:center;padding:0 14px;font-size:13px;font-weight:700">✦ Modo Libre</div>
      <button class="ancla-cambiar-btn" onclick="irPaso(1)">← Cambiar prenda</button>
    </div>`;
  } else {
    chipEl.innerHTML = chipAnclaHTML(ancla);
  }

  let grupos;

  if(modoLibreActivo) {
    // Genera desde todos los superiores como ancla para máxima variedad
    const anclas = inventario.filter(p => ['superior','exterior','inferior'].includes(getPosicion(p.tipo)));
    const combinados = {};
    ARMONIAS.forEach(arm => combinados[arm.key] = { arm, outfitsSet: new Set(), outfits: [] });

    anclas.forEach(ref => {
      ARMONIAS.forEach(arm => {
        const res = generarParaArmonia(ref, arm.key);
        res.forEach(o => {
          const k = o.piezas.map(p=>p.id).sort().join('-');
          if(!combinados[arm.key].outfitsSet.has(k)) {
            combinados[arm.key].outfitsSet.add(k);
            combinados[arm.key].outfits.push(o);
          }
        });
      });
    });

    grupos = ARMONIAS
      .map(arm => ({ arm, outfits: combinados[arm.key].outfits.sort(()=>Math.random()-0.5).slice(0,15) }))
      .filter(g => g.outfits.length);
  } else {
    grupos = generarTodosLosLooks(ancla);
  }

  const total = grupos.reduce((s,g)=>s+g.outfits.length, 0);
  const conResultados = grupos.filter(g=>g.outfits.length).length;
  document.getElementById('res-total').textContent = total + ' looks · ' + conResultados + ' armonías';

  if(!total) {
    document.getElementById('lista-looks').innerHTML = `<div class="no-outfits"><div style="font-size:40px">🔍</div><p>No hay combinaciones.<br>Agrega más prendas al inventario.</p></div>`;
    return;
  }

  const gruposConResultados = grupos.filter(g => g.outfits.length > 0);
  let primeraExpandida = false;
  document.getElementById('lista-looks').innerHTML = gruposConResultados.map(g => {
    const basicos  = g.outfits.filter(o=>o.nivel==='basico');
    const exterior = g.outfits.filter(o=>o.nivel==='exterior');
    const expandir = !primeraExpandida;
    primeraExpandida = true;
    return `
    <div class="armonia-section">
      <div class="armonia-section-header" onclick="toggleArmonia(this)">
        <div class="armonia-section-left">
          <span class="armonia-dot ${g.arm.dotClass}"></span>
          <span class="armonia-section-nombre">${g.arm.nombre}</span>
          <span class="armonia-section-count">${g.outfits.length} looks</span>
        </div>
        <span class="armonia-section-arrow${expandir?' open':''}">›</span>
      </div>
      <div class="armonia-section-items${expandir?' open':''}">
        ${(basicos.length  ? '<div class="nivel-divider">Sin capa exterior</div>'+basicos.map(o=>lookCardHTML(o)).join('') : '')
        + (exterior.length ? '<div class="nivel-divider">Con capa exterior</div>'+exterior.map(o=>lookCardHTML(o)).join('') : '')}
      </div>
    </div>`;
  }).join('');
}

function toggleArmonia(header) {
  const arrow = header.querySelector('.armonia-section-arrow');
  const items = header.nextElementSibling;
  arrow.classList.toggle('open');
  items.classList.toggle('open');
}

const ACC_CABEZA = ['Gorra','Lentes'];
const ACC_CUERPO = ['Bolso','Cinturón','Bufanda','Reloj'];

function lookCardHTML(o) {
  const piezas = o.piezas;
  const colores = [...new Set(piezas.map(p=>p.color))];

  const accCab = piezas.filter(p => ACC_CABEZA.includes(p.tipo));
  const ext    = piezas.filter(p => getPosicion(p.tipo) === 'exterior');
  const sup    = piezas.filter(p => getPosicion(p.tipo) === 'superior');
  const inf    = piezas.filter(p => getPosicion(p.tipo) === 'inferior');
  const cal    = piezas.filter(p => getPosicion(p.tipo) === 'calzado');
  const accCue = piezas.filter(p => ACC_CUERPO.includes(p.tipo));

  const orden = [...accCab, ...ext, ...sup, ...inf, ...cal, ...accCue];

  function fotoItem(p) {
    const pos = getPosicion(p.tipo);
    return `<div class="of-item of-${pos}">
      ${p.foto
        ? '<img src="'+p.foto+'" alt="">'
        : '<div class="of-color" style="background:'+p.color+'">'+tipoIcon(p.tipo)+'</div>'}
    </div>`;
  }

  return `
  <div class="outfit-card">
    <div class="outfit-col">${orden.map(fotoItem).join('')}</div>
    <div class="outfit-paleta">${colores.map(c=>`<div class="paleta-seg" style="background:${c}"></div>`).join('')}</div>
  </div>`;
}

function tipoIcon(tipo) {
  const pos = getPosicion(tipo);
  if(pos==='superior'||pos==='exterior') return '👕';
  if(pos==='inferior') return '👖';
  if(pos==='calzado') return '👟';
  return '🎩';
}

// ======== NAVEGACIÓN ========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  document.getElementById(id==='inventario'?'nav-inv':'nav-con').classList.add('active');
  if(id==='constructor'&&!modoLibreActivo){ renderCatAncla(); irPaso(1); }
  else if(id==='inventario') renderInventario();
  window.scrollTo(0,0);
}

  navigator.serviceWorker.register('/wardrobe/sw.js').catch(()=>{});

if(inventario.length===0){
  fetch("guardarropa.json").then(r=>r.json()).then(data=>{
    inventario=data; guardarLocal(); renderInventario(); renderCatAncla();
  });
} else {
  renderInventario(); renderCatAncla();
}
