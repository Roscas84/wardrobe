<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Guardarropa</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Guardarropa">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#f5f0eb;color:#1a1a1a;min-height:100vh;padding-bottom:80px}

/* SPLASH */
#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.9s ease}
#splash.out{opacity:0;pointer-events:none}
.splash-mg{font-size:48px;font-weight:100;letter-spacing:8px;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.splash-line{width:60px;height:0.5px;background:#fff;margin:14px auto}
.splash-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#888;font-weight:300}

/* HEADER */
header{background:#fff;border-bottom:1px solid #e0dbd5;padding:14px 16px;position:sticky;top:0;z-index:100}
.header-logo{font-size:18px;font-weight:300;letter-spacing:1px;text-transform:uppercase;text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#000;display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;padding:12px 0 9px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;cursor:pointer;font-size:10px;color:#555;letter-spacing:0.5px;text-transform:uppercase;font-weight:300;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.bnav-btn.active{color:#fff}
.bnav-icon{font-size:18px;line-height:1}

/* SCREENS */
.screen{display:none;max-width:600px;margin:0 auto}
.screen.active{display:block}

/* INICIO */
.slideshow{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;background:#000}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 0.2s ease;pointer-events:none}
.slide.active{opacity:1;pointer-events:auto}
.slide img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.editorial-strip{display:flex;flex-direction:column;gap:0}
.editorial-strip img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:center top;display:block}

/* CLOSET & OUTFIT — pantalla negra estilo Zara */
.dark-screen{background:#000;min-height:calc(100vh - 57px - 62px)}
.dark-back{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid #111;cursor:pointer}
.dark-back-arrow{font-size:18px;color:#fff;font-weight:100}
.dark-back-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#888;font-weight:300}

.cat-link{display:block;text-align:center;padding:14px 20px;cursor:pointer;text-decoration:none}
.cat-link-text{font-size:14px;font-weight:300;letter-spacing:0.5px;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;text-transform:uppercase}
.cat-link:active .cat-link-text{color:#555}

.color-link{display:block;text-align:center;padding:14px 20px;cursor:pointer}
.color-link-text{font-size:14px;font-weight:300;letter-spacing:0.5px;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;text-transform:uppercase}

/* Items sub-screen */
.items-header{background:#000;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #111;position:sticky;top:57px;z-index:80}
.items-header-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#fff;font-weight:300}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:#e0dbd5;padding:2px}
.c-card{background:#fff;overflow:hidden;cursor:pointer}
.c-card:active{opacity:.85}
.c-card-img{width:100%;aspect-ratio:3/5;object-fit:contain;background:#f0ebe5;display:block}
.c-card-ph{width:100%;aspect-ratio:3/5;background:#f0ebe5;display:flex;align-items:center;justify-content:center;font-size:30px}
.c-card-info{padding:8px 10px 10px}
.c-card-nombre{font-size:12px;font-weight:400;line-height:1.3;margin-bottom:2px}
.c-card-marca{font-size:10px;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.c-card-color-row{display:flex;align-items:center;gap:5px}
.c-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.c-hex{font-size:9px;color:#aaa;font-family:monospace}

/* Color search sub-screen */
.color-grid{display:flex;flex-wrap:wrap;gap:10px;padding:20px}
.color-bubble{width:52px;height:52px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.color-bubble.on{border-color:#fff;box-shadow:0 0 0 1px #fff}
.color-bubble-all{width:52px;height:52px;border-radius:50%;background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);cursor:pointer;border:2px solid transparent;flex-shrink:0}
.color-bubble-all.on{border-color:#fff}
.color-section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#555;padding:14px 20px 6px;font-weight:300}

/* OUTFIT paso 2 */
.res-hdr{padding:10px 16px;background:#000;border-bottom:1px solid #111;display:flex;align-items:center;gap:10px;position:sticky;top:57px;z-index:90}
.res-ancla-thumb{width:50px;height:68px;object-fit:contain;background:#111;flex-shrink:0;display:block}
.res-ancla-color{width:50px;height:68px;flex-shrink:0}
.btn-cambiar{padding:10px 16px;border:1px solid #444;background:transparent;color:#fff;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:300;flex-shrink:0;white-space:nowrap;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.res-count{font-size:10px;color:#555;padding:10px 16px 4px;letter-spacing:.5px;background:#000}

.arm-sec{margin-bottom:1px;background:#000;border-bottom:1px solid #111}
.arm-sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer}
.arm-sec-left{display:flex;align-items:center;gap:8px}
.arm-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.arm-nombre{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;font-weight:300;color:#fff}
.arm-count{font-size:10px;color:#444;margin-left:4px}
.arm-arrow{font-size:14px;color:#444;transition:transform .2s}
.arm-arrow.open{transform:rotate(90deg)}
.arm-items{display:none;padding:2px;background:#e0dbd5}
.arm-items.open{display:block}

.outfit-card{background:#fff;margin-bottom:2px}
.outfit-col{display:flex;flex-direction:column;gap:1px;background:rgba(0,0,0,.05)}
.of-item{overflow:hidden;width:100%;background:#f7f5f2}
.of-item img{width:100%;height:100%;object-fit:contain}
.of-color{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;background:#f7f5f2}
.of-superior,.of-inferior,.of-exterior{height:238px}
.of-calzado,.of-accesorios{height:150px}
.outfit-paleta{display:flex;height:14px}
.paleta-seg{flex:1}
.nivel-div{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:2px;font-weight:300;margin:6px 16px 4px;background:#000;padding:6px 0 2px}
.no-outfits{text-align:center;padding:40px 20px;color:#555;background:#000;min-height:200px}
.no-outfits p{font-size:14px;margin-top:8px;color:#555}

/* Outfit paso 1 modo libre */
.ml-wrap{position:fixed;bottom:calc(62px + env(safe-area-inset-bottom));left:0;right:0;padding:8px 16px;background:linear-gradient(transparent,rgba(0,0,0,.97) 35%);z-index:150}
.btn-ml{width:100%;max-width:600px;margin:0 auto;display:block;padding:13px;background:#fff;color:#000;border:none;font-size:10px;font-weight:400;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

/* CARGAR */
.cargar-block{background:#fff;margin-bottom:2px}
.cargar-block-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:400;padding:18px 16px 12px}
.search-wrap{display:flex;align-items:center;padding:0 16px 12px;gap:8px}
.search-inp{flex:1;padding:10px 12px;border:1px solid #e0dbd5;font-size:14px;background:#f8f5f2;outline:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.search-results{padding:0 16px 16px}
.s-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0ebe5}
.s-item-img{width:34px;height:46px;object-fit:contain;background:#f0ebe5;flex-shrink:0}
.s-item-info{flex:1}
.s-item-nombre{font-size:13px;font-weight:400}
.s-item-meta{font-size:10px;color:#888;letter-spacing:.5px;margin-top:1px}
.s-item-btns{display:flex;gap:4px;flex-shrink:0}
.btn-edit-s{padding:6px 10px;border:1px solid #e0dbd5;background:#fff;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.btn-del-s{padding:6px 10px;background:#000;color:#fff;border:none;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;padding:20px 16px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:3px;background:#e0dbd5;margin:0 auto 16px}
.modal h3{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:400;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:9px;color:#888;margin-bottom:5px;font-weight:400;text-transform:uppercase;letter-spacing:1px}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid #e0dbd5;font-size:15px;background:#fff;-webkit-appearance:none;outline:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.foto-area{border:1px solid #e0dbd5;padding:20px;text-align:center;cursor:pointer;margin-bottom:14px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8f5f2}
.foto-area img{width:100%;max-height:200px;object-fit:contain}
.foto-area p{font-size:10px;color:#888;margin-top:6px;letter-spacing:1px;text-transform:uppercase}
.modal-btns{display:flex;gap:2px;margin-top:8px;padding-bottom:env(safe-area-inset-bottom)}
.btn-cancel{flex:1;padding:14px;border:1px solid #e0dbd5;background:#fff;font-size:11px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.btn-save{flex:2;padding:14px;border:none;background:#000;color:#fff;font-size:11px;cursor:pointer;font-weight:400;letter-spacing:1px;text-transform:uppercase;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.color-row{display:flex;align-items:center;gap:10px}
.color-swatch-inp{width:44px;height:44px;border:1px solid #e0dbd5;cursor:pointer;flex-shrink:0}
.hex-input{flex:1;padding:10px 12px;border:1px solid #e0dbd5;font-size:15px;font-family:monospace;outline:none}
.c-ana{background:#1a7a1a}.c-comp{background:#c44800}.c-split{background:#b87000}
.c-tri{background:#1a3acc}.c-tet{background:#7700cc}.c-cua{background:#cc0077}.c-abs{background:#007755}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-mg">MG</div>
  <div class="splash-line"></div>
  <div class="splash-sub">Mi Guardarropa</div>
</div>

<header><div class="header-logo">Mi Guardarropa</div></header>

<!-- ══ INICIO ══ -->
<div id="screen-inicio" class="screen active">
  <div class="slideshow" id="slideshow">
    <div class="slide active"><img src="slides/slide1.jpg" loading="eager" alt=""></div>
    <div class="slide"><img src="slides/slide3.jpg" loading="lazy" alt=""></div>
    <div class="slide"><img src="slides/slide5.jpg" loading="lazy" alt=""></div>
    <div class="slide"><img src="slides/slide7.jpg" loading="lazy" alt=""></div>
    <div class="slide"><img src="slides/slide9.jpg" loading="lazy" alt=""></div>
  </div>
  <div class="editorial-strip">
    <img src="slides/slide2.jpg" loading="lazy" alt="">
    <img src="slides/slide4.jpg" loading="lazy" alt="">
    <img src="slides/slide6.jpg" loading="lazy" alt="">
    <img src="slides/slide8.jpg" loading="lazy" alt="">
    <img src="slides/slide10.jpg" loading="lazy" alt="">
  </div>
  <div style="height:12px;background:#f5f0eb"></div>
</div>

<!-- ══ CLOSET ══ -->
<div id="screen-closet" class="screen">
  <!-- Vista principal: lista de categorías -->
  <div id="closet-main" class="dark-screen">
    <div id="closet-cat-links"></div>
    <div class="color-link" onclick="verColorCloset()">
      <span class="color-link-text">Búsqueda por color</span>
      <span style="color:#444;font-size:12px">›</span>
    </div>
  </div>
  <!-- Vista de items por categoría -->
  <div id="closet-items-wrap" style="display:none">
    <div class="items-header" style="background:#000;cursor:pointer" onclick="volverClosetMain()">
      <span class="dark-back-arrow">‹</span>
      <span id="closet-items-title" class="items-header-title"></span>
    </div>
    <div id="closet-items-grid" class="items-grid"></div>
  </div>
  <!-- Vista de búsqueda por color -->
  <div id="closet-color-wrap" style="display:none" class="dark-screen">
    <div class="items-header" style="background:#000;cursor:pointer" onclick="volverClosetMain()">
      <span class="dark-back-arrow">‹</span>
      <span class="items-header-title">Búsqueda por color</span>
    </div>
    <div id="color-bubbles" class="color-grid"></div>
    <div id="closet-color-items" style="display:none">
      <div class="color-section-title" id="color-items-label"></div>
      <div id="closet-color-grid" class="items-grid"></div>
    </div>
  </div>
</div>

<!-- ══ OUTFIT ══ -->
<div id="screen-outfit" class="screen">
  <!-- Paso 1: selección de ancla -->
  <div id="paso1-wrap">
    <!-- Vista principal: categorías -->
    <div id="outfit-main" class="dark-screen">
      <div style="padding:24px 20px 4px;text-align:center">
        <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#555;font-weight:300;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif">Elige tu prenda ancla</div>
      </div>
      <div id="outfit-cat-links"></div>
      <div style="height:72px"></div>
      <div class="ml-wrap">
        <button class="btn-ml" onclick="activarModoLibre()">✦ Modo Libre</button>
      </div>
    </div>
    <!-- Vista de items por categoría (para seleccionar ancla) -->
    <div id="outfit-items-wrap" style="display:none">
      <div class="items-header" style="background:#000;cursor:pointer" onclick="volverOutfitMain()">
        <span class="dark-back-arrow">‹</span>
        <span id="outfit-items-title" class="items-header-title"></span>
      </div>
      <div id="outfit-items-grid" class="items-grid"></div>
      <div style="height:72px"></div>
      <div class="ml-wrap">
        <button class="btn-ml" onclick="activarModoLibre()">✦ Modo Libre</button>
      </div>
    </div>
  </div>
  <!-- Paso 2: resultados -->
  <div id="paso2-wrap" style="display:none">
    <div class="res-hdr">
      <div id="ancla-chip-res" style="display:flex;align-items:center;flex:1"></div>
      <button class="btn-cambiar" onclick="irPaso(1)">← Cambiar</button>
    </div>
    <div class="res-count" id="res-total"></div>
    <div id="lista-looks"></div>
    <div style="height:20px;background:#000"></div>
  </div>
</div>

<!-- ══ CARGAR ══ -->
<div id="screen-cargar" class="screen">
  <div class="cargar-block">
    <div class="cargar-block-title">Nueva Prenda</div>
    <div style="padding:0 16px 16px">
      <button onclick="abrirModal()" style="width:100%;padding:14px;background:#000;color:#fff;border:none;font-size:10px;font-weight:400;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif">+ Agregar Prenda</button>
    </div>
  </div>
  <div class="cargar-block" style="margin-top:2px">
    <div class="cargar-block-title">Buscar & Gestionar</div>
    <div class="search-wrap">
      <input class="search-inp" id="search-input" type="text" placeholder="Nombre, tipo o marca..." oninput="buscarPrenda(this.value)">
    </div>
    <div class="search-results" id="search-results"></div>
  </div>
  <div class="cargar-block" style="margin-top:2px;padding:16px">
    <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:12px">Datos</div>
    <div style="display:flex;gap:2px">
      <button onclick="exportarInventario()" style="flex:1;padding:12px;border:1px solid #e0dbd5;background:#fff;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer">Exportar</button>
      <button onclick="document.getElementById('import-file').click()" style="flex:1;padding:12px;border:1px solid #e0dbd5;background:#fff;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer">Importar</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importarInventario(this)">
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-prenda">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modal-titulo">Agregar prenda</h3>
    <div class="foto-area" id="foto-area" onclick="document.getElementById('input-foto').click()">
      <div style="font-size:32px">📷</div>
      <p id="foto-status">Toca para agregar foto</p>
      <img id="preview-foto" style="display:none;margin-top:10px">
    </div>
    <input type="file" id="input-foto" accept="image/*" capture="environment" style="display:none" onchange="cargarFoto(this)">
    <div class="field"><label>Nombre</label><input type="text" id="inp-nombre" placeholder="Ej: Jean azul claro"></div>
    <div class="field">
      <label>Tipo</label>
      <select id="inp-tipo">
        <option value="">Selecciona...</option>
        <optgroup label="— Superior —">
          <option>Camiseta</option><option>Camisa</option><option>Hoodie</option>
          <option>Polo</option><option>Sudadera</option><option>Suéter</option><option>Tank top</option>
        </optgroup>
        <optgroup label="— Exterior —">
          <option>Blazer</option><option>Chamarra</option><option>Abrigo</option><option>Chaqueta</option>
        </optgroup>
        <optgroup label="— Inferior —">
          <option>Jean</option><option>Jean largo</option><option>Jean tres cuartos</option>
          <option>Pantalón</option><option>Overalls</option><option>Short</option><option>Jogger</option>
        </optgroup>
        <optgroup label="— Calzado —">
          <option>Sneakers</option><option>Converse</option><option>Botas</option><option>Bota</option>
          <option>Zapato</option><option>Sandalias</option><option>Sandalia</option><option>Mocasín</option>
        </optgroup>
        <optgroup label="— Accesorios —">
          <option>Gorra</option><option>Bolso</option><option>Lentes</option>
          <option>Cinturón</option><option>Bufanda</option><option>Reloj</option>
        </optgroup>
      </select>
    </div>
    <div class="field">
      <label>Color principal</label>
      <div class="color-row">
        <input type="color" class="color-swatch-inp" id="inp-color" value="#000000" oninput="syncColor('picker')">
        <input type="text" class="hex-input" id="inp-hex" placeholder="#000000" maxlength="7" oninput="syncColor('hex')">
      </div>
    </div>
    <div class="field"><label>Marca</label><input type="text" id="inp-marca" placeholder="Ej: Zara, Nike..."></div>
    <div class="field">
      <label>Formalidad</label>
      <select id="inp-formalidad">
        <option value="casual">Casual</option><option value="smart casual">Smart casual</option>
        <option value="streetwear">Streetwear</option><option value="formal">Formal</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" onclick="guardarPrenda()">Guardar</button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav class="bottom-nav">
  <button class="bnav-btn active" id="nav-inicio" onclick="showScreen('inicio')">
    <span class="bnav-icon">⌂</span>Inicio
  </button>
  <button class="bnav-btn" id="nav-closet" onclick="showScreen('closet')">
    <span class="bnav-icon">☰</span>Closet
  </button>
  <button class="bnav-btn" id="nav-outfit" onclick="showScreen('outfit')">
    <span class="bnav-icon">✦</span>Outfit
  </button>
  <button class="bnav-btn" id="nav-cargar" onclick="showScreen('cargar')">
    <span class="bnav-icon">＋</span>Cargar
  </button>
</nav>

<script>
let inventario = JSON.parse(localStorage.getItem('wrd_inv') || '[]');
let ancla = null, modoLibreActivo = false, editandoId = null, colorFiltro = null;
const RMBG_KEY = 'Misp39S3s5vPZsMBwYcnA8s1';

function getPosicion(tipo){
  if(['Jean','Jean largo','Jean tres cuartos','Pantalón','Overalls','Short','Jogger'].includes(tipo)) return 'inferior';
  if(['Blazer','Chamarra','Abrigo','Chaqueta'].includes(tipo)) return 'exterior';
  if(['Sneakers','Converse','Botas','Bota','Zapato','Sandalias','Sandalia','Mocasín'].includes(tipo)) return 'calzado';
  if(['Gorra','Bolso','Lentes','Cinturón','Bufanda','Reloj'].includes(tipo)) return 'accesorios';
  return 'superior';
}

// COLOR ENGINE
function hexToHsl(hex){
  hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
  let r=parseInt(hex.slice(0,2),16)/255,g=parseInt(hex.slice(2,4),16)/255,b=parseInt(hex.slice(4,6),16)/255;
  let max=Math.max(r,g,b),min=Math.min(r,g,b),h=0,s=0,l=(max+min)/2;
  if(max!==min){let d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}
function esNeutro(hex){
  const{h,s,l}=hexToHsl(hex);
  if(s<15||l>85||l<10)return true;
  if(hueDist(h,220)<25&&l<35)return true;
  if(h>=25&&h<=55&&s>=12&&s<=45&&l>=50&&l<=82)return true;
  if(h>=50&&h<=80&&s>=10&&s<=40&&l>=30&&l<=60)return true;
  return false;
}
function hueDist(h1,h2){const d=Math.abs(h1-h2);return Math.min(d,360-d);}
function getHuesObjetivo(hAncla,arm){
  switch(arm){
    case'analoga':return[(hAncla+30)%360,(hAncla+330)%360];
    case'complementaria':return[(hAncla+180)%360];
    case'split':return[(hAncla+150)%360,(hAncla+210)%360];
    case'triadica':return[(hAncla+120)%360,(hAncla+240)%360];
    case'tetradica':return[(hAncla+60)%360,(hAncla+180)%360,(hAncla+240)%360];
    case'cuadrada':return[(hAncla+90)%360,(hAncla+180)%360,(hAncla+270)%360];
    case'abstracta':return[(hAncla+30)%360,(hAncla+150)%360,(hAncla+210)%360];
  }
}
const TOLERANCIA=28;
function esCompatible(pHex,huesObj,anclaHex){
  if(pHex===anclaHex)return false;
  if(esNeutro(pHex))return true;
  const{h}=hexToHsl(pHex);return huesObj.some(hObj=>hueDist(h,hObj)<=TOLERANCIA);
}

// GENERADOR
function generarParaArmonia(anclaRef,armKey){
  const huesObj=getHuesObjetivo(hexToHsl(anclaRef.color).h,armKey);
  const otras=inventario.filter(p=>p.id!==anclaRef.id);
  function pool(pos){const all=otras.filter(p=>getPosicion(p.tipo)===pos);const c=all.filter(p=>esCompatible(p.color,huesObj,anclaRef.color));return c.length?c:all;}
  const anclaPos=getPosicion(anclaRef.tipo);
  const sup=pool('superior'),ext=pool('exterior'),inf=pool('inferior'),cal=pool('calzado'),acc=pool('accesorios');
  const outfits=[];
  function push(piezas,nivel){
    if(!piezas.some(p=>getPosicion(p.tipo)==='calzado')&&cal.length)piezas=[...piezas,cal[outfits.length%cal.length]];
    if(acc.length&&outfits.length%3===1&&!piezas.some(p=>getPosicion(p.tipo)==='accesorios'))piezas=[...piezas,acc[outfits.length%acc.length]];
    outfits.push({nivel,piezas});
  }
  if(anclaPos==='superior'){inf.forEach(i=>{push([anclaRef,i],'basico');ext.forEach(e=>push([e,anclaRef,i],'exterior'));});}
  else if(anclaPos==='exterior'){sup.forEach(s=>inf.forEach(i=>push([anclaRef,s,i],'exterior')));}
  else if(anclaPos==='inferior'){sup.forEach(s=>{push([s,anclaRef],'basico');ext.forEach(e=>push([e,s,anclaRef],'exterior'));});}
  else if(anclaPos==='calzado'){sup.forEach(s=>inf.forEach(i=>{push([s,i,anclaRef],'basico');ext.forEach(e=>push([e,s,i,anclaRef],'exterior'));}));}
  else if(anclaPos==='accesorios'){sup.forEach(s=>inf.forEach(i=>{push([s,i,anclaRef],'basico');ext.forEach(e=>push([e,s,i,anclaRef],'exterior'));}));}
  const seen=new Set();
  return outfits.filter(o=>{const k=o.piezas.map(p=>p.id).sort().join('-');if(seen.has(k))return false;seen.add(k);return true;});
}
function generarTodosLosLooks(anclaRef){return ARMONIAS.map(arm=>({arm,outfits:generarParaArmonia(anclaRef,arm.key)}));}

function filtrarColorBubble(color){

    document.getElementById('closet-color-items').style.display='block';

// CARGAR
function buscarPrenda(q){
  const res=document.getElementById('search-results');
  if(!q.trim()){res.innerHTML='';return;}
  const found=inventario.filter(p=>p.nombre.toLowerCase().includes(q.toLowerCase())||(p.marca||'').toLowerCase().includes(q.toLowerCase())||p.tipo.toLowerCase().includes(q.toLowerCase()));
  if(!found.length){res.innerHTML='<p style="font-size:13px;color:#888;padding:12px 0">Sin resultados</p>';return;}
  res.innerHTML=found.map(p=>`<div class="s-item">
    ${p.foto?`<img class="s-item-img" src="${p.foto}" alt="">`:`<div class="s-item-img" style="background:${p.color}"></div>`}
    <div class="s-item-info"><div class="s-item-nombre">${p.nombre}</div><div class="s-item-meta">${p.tipo}${p.marca?' · '+p.marca:''}</div></div>
    <div class="s-item-btns">
      <button class="btn-edit-s" onclick="editarPrenda(${p.id})">Editar</button>
      <button class="btn-del-s" onclick="eliminarPrenda(${p.id})">Eliminar</button>
    </div>
  </div>`).join('');
}

// REMOVE.BG
async function removerFondo(dataUrl){
  const blob=await fetch(dataUrl).then(r=>r.blob());
  const fd=new FormData();fd.append('image_file',blob,'photo.jpg');fd.append('size','auto');
  const res=await fetch('https://api.remove.bg/v1.0/removebg',{method:'POST',headers:{'X-Api-Key':RMBG_KEY},body:fd});
  if(!res.ok)throw new Error('removebg '+res.status);
  const buf=await res.arrayBuffer();const bytes=new Uint8Array(buf);
  let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  return'data:image/png;base64,'+btoa(bin);
}
function extraerColor(imgEl){
  try{
    const c=document.createElement('canvas');c.width=c.height=60;const ctx=c.getContext('2d');ctx.drawImage(imgEl,0,0,60,60);
    const d=ctx.getImageData(0,0,60,60).data;let r=0,g=0,b=0,n=0;
    for(let i=0;i<d.length;i+=4){if(d[i+3]<128)continue;r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
    if(!n)return null;return'#'+[r,g,b].map(v=>Math.round(v/n).toString(16).padStart(2,'0')).join('');
  }catch(e){return null;}
}
function cargarFoto(input){
  if(!input.files[0])return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const img=document.getElementById('preview-foto');const status=document.getElementById('foto-status');
    img.src=e.target.result;img.style.display='block';status.textContent='⏳ Quitando fondo...';
    try{
      const sinFondo=await removerFondo(e.target.result);img.src=sinFondo;
      await new Promise(res=>{img.onload=res;img.onerror=res;});status.textContent='✓ Fondo eliminado';
    }catch(err){status.textContent='Toca para cambiar foto';}
    const color=extraerColor(img);
    if(color){document.getElementById('inp-color').value=color;document.getElementById('inp-hex').value=color;}
  };
  reader.readAsDataURL(input.files[0]);
}
function guardarPrenda(){
  const nombre=document.getElementById('inp-nombre').value.trim();
  const tipo=document.getElementById('inp-tipo').value;
  const color=document.getElementById('inp-color').value;
  const marca=document.getElementById('inp-marca').value.trim();
  const formalidad=document.getElementById('inp-formalidad').value;
  const fotoEl=document.getElementById('preview-foto');
  const foto=fotoEl.src&&fotoEl.style.display!=='none'?fotoEl.src:null;
  if(!nombre||!tipo){alert('Escribe el nombre y selecciona el tipo.');return;}
  if(editandoId){
    const idx=inventario.findIndex(p=>p.id===editandoId);
    if(idx>=0)inventario[idx]={...inventario[idx],nombre,tipo,color,marca,formalidad,foto,pos:getPosicion(tipo)};
  }else{
    inventario.push({id:Date.now(),nombre,tipo,color,marca,formalidad,foto,pos:getPosicion(tipo)});
  }
  guardarLocal();renderClosetMain();renderOutfitMain();cerrarModal();
}

function selAncla(id){

  mostrarLooks();
}
function irPaso(n){
  ['paso1-wrap','paso2-wrap'].forEach(id=>document.getElementById(id).style.display='none');

  window.scrollTo(0,0);
  if(n===1){renderOutfitMain();volverOutfitMain();}
}
function activarModoLibre(){modoLibreActivo=true;ancla=null;showScreen('outfit');mostrarLooks();}
function mostrarLooks(){
  document.getElementById('paso1-wrap').style.display='none';
  document.getElementById('paso2-wrap').style.display='block';
  window.scrollTo(0,0);
  const chipEl=document.getElementById('ancla-chip-res');
  if(modoLibreActivo){
    chipEl.innerHTML=`<div style="font-size:10px;font-weight:300;letter-spacing:2px;text-transform:uppercase;padding:0 4px;color:#fff">✦ Modo Libre</div>`;
  }else{
    chipEl.innerHTML=ancla?.foto
      ?`<img class="res-ancla-thumb" src="${ancla.foto}" alt="">`
      :`<div class="res-ancla-color" style="background:${ancla?.color}"></div>`;
  }
  let grupos;
  if(modoLibreActivo){
    const anclas=inventario.filter(p=>['superior','exterior','inferior'].includes(getPosicion(p.tipo)));
    const combinados={};
    ARMONIAS.forEach(arm=>combinados[arm.key]={arm,outfitsSet:new Set(),outfits:[]});
    anclas.forEach(ref=>{ARMONIAS.forEach(arm=>{
      generarParaArmonia(ref,arm.key).forEach(o=>{
        const k=o.piezas.map(p=>p.id).sort().join('-');
        if(!combinados[arm.key].outfitsSet.has(k)){combinados[arm.key].outfitsSet.add(k);combinados[arm.key].outfits.push(o);}
      });
    });});
    grupos=ARMONIAS.map(arm=>({arm,outfits:combinados[arm.key].outfits.sort(()=>Math.random()-0.5).slice(0,15)})).filter(g=>g.outfits.length);
  }else{
    grupos=generarTodosLosLooks(ancla);
  }
  const gruposConRes=grupos.filter(g=>g.outfits.length>0);
  const total=gruposConRes.reduce((s,g)=>s+g.outfits.length,0);
  document.getElementById('res-total').textContent=total+' looks · '+gruposConRes.length+' armonías';
  if(!total){document.getElementById('lista-looks').innerHTML=`<div class="no-outfits"><div style="font-size:40px">🔍</div><p>No hay combinaciones.<br>Agrega más prendas.</p></div>`;return;}
  document.getElementById('lista-looks').innerHTML=gruposConRes.map(g=>{
    const basicos=g.outfits.filter(o=>o.nivel==='basico');
    const exterior=g.outfits.filter(o=>o.nivel==='exterior');
    return`<div class="arm-sec">
      <div class="arm-sec-hdr" onclick="this.querySelector('.arm-arrow').classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <div class="arm-sec-left"><span class="arm-dot ${g.arm.dotClass}"></span><span class="arm-nombre">${g.arm.nombre}</span><span class="arm-count">${g.outfits.length} looks</span></div>
        <span class="arm-arrow">›</span>
      </div>
      <div class="arm-items">
        ${basicos.length?'<div class="nivel-div">Sin capa exterior</div>'+basicos.map(o=>lookCardHTML(o)).join(''):''}
        ${exterior.length?'<div class="nivel-div">Con capa exterior</div>'+exterior.map(o=>lookCardHTML(o)).join(''):''}
      </div>
    </div>`;
  }).join('');
}
function lookCardHTML(o){
  const piezas=o.piezas,colores=[...new Set(piezas.map(p=>p.color))];
  const accCab=piezas.filter(p=>ACC_CABEZA.includes(p.tipo));
  const ext=piezas.filter(p=>getPosicion(p.tipo)==='exterior');
  const sup=piezas.filter(p=>getPosicion(p.tipo)==='superior');
  const inf=piezas.filter(p=>getPosicion(p.tipo)==='inferior');
  const cal=piezas.filter(p=>getPosicion(p.tipo)==='calzado');
  const accCue=piezas.filter(p=>ACC_CUERPO.includes(p.tipo));
  const orden=[...accCab,...ext,...sup,...inf,...cal,...accCue];
  function fi(p){const pos=getPosicion(p.tipo);return`<div class="of-item of-${pos}">${p.foto?`<img src="${p.foto}" alt="">`:`<div class="of-color" style="background:${p.color}">${tipoIcon(p.tipo)}</div>`}</div>`;}
  return`<div class="outfit-card"><div class="outfit-col">${orden.map(fi).join('')}</div><div class="outfit-paleta">${colores.map(c=>`<div class="paleta-seg" style="background:${c}"></div>`).join('')}</div></div>`;
}
function tipoIcon(tipo){const pos=getPosicion(tipo);if(pos==='superior'||pos==='exterior')return'👕';if(pos==='inferior')return'👖';if(pos==='calzado')return'👟';return'🎩';}

// SLIDESHOW
let slideIdx=0,slideTimer=null;
function initSlideshow(){
  const slides=document.querySelectorAll('.slide');if(!slides.length)return;
  function goTo(n){
    slides[slideIdx].classList.remove('active');slideIdx=(n+slides.length)%slides.length;slides[slideIdx].classList.add('active');
  }
  slideTimer=setInterval(()=>goTo(slideIdx+1),900);
  let tx=0;const ss=document.getElementById('slideshow');
  ss.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
  ss.addEventListener('touchend',e=>{const diff=tx-e.changedTouches[0].clientX;if(Math.abs(diff)>50){clearInterval(slideTimer);goTo(slideIdx+(diff>0?1:-1));slideTimer=setInterval(()=>goTo(slideIdx+1),900);}},{passive:true});
}

// NAVEGACIÓN
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='closet'){renderClosetMain();volverClosetMain();}
  else if(id==='outfit'&&!modoLibreActivo){renderOutfitMain();irPaso(1);}
  else if(id==='cargar'){document.getElementById('search-input').value='';document.getElementById('search-results').innerHTML='';}
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/wardrobe/sw.js').catch(()=>{});}
window.addEventListener('load',()=>{
  initSlideshow();
  setTimeout(()=>{const sp=document.getElementById('splash');sp.classList.add('out');setTimeout(()=>sp.style.display='none',900);},2000);
});
if(inventario.length===0){
  fetch('guardarropa.json').then(r=>r.json()).then(data=>{inventario=data;guardarLocal();renderClosetMain();renderOutfitMain();});
}else{renderClosetMain();renderOutfitMain();}
</script>
